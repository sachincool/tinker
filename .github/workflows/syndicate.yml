name: Syndicate to dev.to

on:
  push:
    branches: [main]
    paths:
      - 'content/blog/**'
      - 'content/til/**'
  workflow_dispatch:
    inputs:
      post:
        description: 'Single slug to syndicate (leave blank to sync everything)'
        required: false
        type: string
      dry_run:
        description: 'Dry run only — no API writes'
        required: false
        type: boolean
        default: false

concurrency:
  group: syndicate-devto
  cancel-in-progress: false

jobs:
  syndicate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Validate frontmatter
        run: node scripts/validate-frontmatter.mjs

      - name: Syndicate to dev.to
        env:
          DEVTO_API_KEY: ${{ secrets.DEVTO_API_KEY }}
        run: |
          ARGS="--platform=devto --update --throttle=4000"
          if [ -n "${{ github.event.inputs.post }}" ]; then
            ARGS="$ARGS --post=${{ github.event.inputs.post }}"
          else
            ARGS="$ARGS --all"
          fi
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          echo "Running: node scripts/syndicate.mjs $ARGS"
          node scripts/syndicate.mjs $ARGS

      - name: Commit updated syndication-state.json
        if: github.event.inputs.dry_run != 'true'
        run: |
          if git diff --quiet scripts/syndication-state.json; then
            echo "No state changes to commit."
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add scripts/syndication-state.json
          # [skip ci] prevents the state-file commit from re-triggering the workflow.
          git commit -m "chore(syndicate): refresh dev.to state [skip ci]"
          # Rebase before pushing: this job checked out the SHA that triggered it,
          # so a commit pushed to main meanwhile (another run's state commit, a
          # local push) would make a plain push fail non-fast-forward and silently
          # drop this run's state — causing duplicate dev.to articles next run.
          git pull --rebase origin main
          git push

      - name: Remind about pending Medium imports
        if: github.event.inputs.dry_run != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node scripts/medium-import.mjs --pending > /tmp/medium-pending.txt
          COUNT=$(grep -c . /tmp/medium-pending.txt || true)
          EXISTING=$(gh issue list --label medium-pending --state open --json number --jq '.[0].number' || true)
          if [ "$COUNT" -gt 0 ]; then
            echo "::warning::$COUNT post(s) pending Medium import"
            gh label create medium-pending --description "Posts awaiting Medium import" --color C2410C --force || true
            {
              echo "These posts are live on the site (and synced to dev.to) but not yet imported to Medium:"
              echo
              sed 's/^/- /' /tmp/medium-pending.txt
              echo
              echo 'Run `npm run medium:import` locally (headed Chrome), publish the drafts at https://medium.com/me/stories/drafts, then commit `scripts/syndication-state.json`.'
              echo
              echo '_Auto-maintained by the syndicate workflow — closes itself when the state file catches up._'
            } > /tmp/medium-issue-body.md
            if [ -n "$EXISTING" ]; then
              gh issue edit "$EXISTING" --body-file /tmp/medium-issue-body.md
            else
              gh issue create --title "Pending Medium imports" --label medium-pending --body-file /tmp/medium-issue-body.md
            fi
          elif [ -n "$EXISTING" ]; then
            gh issue close "$EXISTING" --comment "All posts are now on Medium — closing."
          fi
