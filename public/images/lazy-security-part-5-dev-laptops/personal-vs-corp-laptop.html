<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>where the snowflake breach lived</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --color-paper:   #11141c;
      --color-paper-2: #161a24;
      --color-ink:     #ecedf0;
      --color-muted:   #8a93a6;
      --color-soft:    #5c6478;
      --color-rule:    rgba(236,237,240,0.10);
      --color-coral:   #ff6b5a;
      --color-cyan:    #5bc0d9;
      --color-green:   #7ec98f;
      --font-sans:     'Geist', system-ui, sans-serif;
      --font-serif:    'Instrument Serif', serif;
      --font-mono:     'Geist Mono', ui-monospace, monospace;
    }

    html, body { background: var(--color-paper); }

    body {
      font-family: var(--font-sans);
      color: var(--color-ink);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2.5rem 2rem;
    }

    .frame { max-width: 1520px; width: 100%; }

    .eyebrow {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--color-muted);
      margin-bottom: 0.6rem;
    }

    h1 {
      font-family: var(--font-serif);
      font-size: clamp(1.8rem, 2.8vw + 0.75rem, 2.6rem);
      font-weight: 400;
      letter-spacing: -0.015em;
      line-height: 1.15;
      color: var(--color-ink);
      margin-bottom: 2rem;
    }

    figcaption {
      font-family: var(--font-serif);
      font-style: italic;
      font-size: 1.05rem;
      color: var(--color-muted);
      margin-top: 1.25rem;
      letter-spacing: -0.005em;
    }

    svg { width: 100%; display: block; }
  </style>
</head>
<body>
  <div class="frame">
    <p class="eyebrow">Figure · device boundary contrast</p>
    <h1>where the snowflake breach lived</h1>

    <svg viewBox="0 0 1600 920" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Side-by-side comparison of a personal BYOD MacBook and a corp-issued MDM-enrolled MacBook across seven configuration rows">

      <!-- Background -->
      <rect width="100%" height="100%" fill="#11141c"/>
      <rect width="100%" height="100%" fill="url(#dots)" opacity="0.7"/>

      <!--
        Layout:
          frame padding 40px each side
          left panel:  x = 80,  w = 700  (80..780)
          divider at x = 800

          panel y = 80, panel h = 720

           PANEL BACKGROUNDS (coral / green tint)
           ===================================== -->

      <!-- Right panel: green tint -->
      <rect x="820" y="80" width="700" height="720" rx="8" fill="rgba(126,201,143,0.05)" stroke="rgba(126,201,143,0.25)" stroke-width="1"/>

      <!-- =====================================
           PANEL HEADERS
           ===================================== -->

      <!-- LEFT header -->
      <rect x="104" y="108" width="208" height="20" rx="2" fill="transparent" stroke="rgba(255,107,90,0.55)" stroke-width="0.8"/>
      <text x="208" y="122" fill="#ff6b5a" font-size="10" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.22em" font-weight="500">PERSONAL DEVICE, BYOD</text>

      <!-- RIGHT header -->

      <!-- =====================================

           ===================================== -->
