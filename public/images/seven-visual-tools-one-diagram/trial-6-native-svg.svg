  <!-- Hub → spoke arrows from ArgoCD badge to argocd-agent rows -->
  <path d="M 700,156 C 700,200 250,260 240,298" fill="none" stroke="#ff9900" stroke-width="1.5" marker-end="url(#arrowOrange)" stroke-dasharray="6,4" opacity="0.9"/>
  <path d="M 700,156 C 700,210 660,260 650,298" fill="none" stroke="#ff9900" stroke-width="1.5" marker-end="url(#arrowOrange)" stroke-dasharray="6,4" opacity="0.9"/>
  <path d="M 700,156 C 700,200 1060,260 1060,298" fill="none" stroke="#ff9900" stroke-width="1.5" marker-end="url(#arrowOrange)" stroke-dasharray="6,4" opacity="0.9"/>

