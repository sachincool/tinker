    <text x="14" y="22" fill="#5DEAA0" font-size="11" font-weight="700" letter-spacing="2">OBSERVABILITY · INCIDENT RESPONSE</text>
    <text x="14" y="48" fill="#e6e6e6" font-size="11">New Relic · single account aggregating APM, infra, k8s events from all 3 clusters</text>
    <text x="14" y="68" fill="#e6e6e6" font-size="11">Zenduty · oncall routing · escalation policies · paged from NR alert conditions</text>
    <text x="14" y="88" fill="#7a8595" font-size="10">All cluster newrelic-agent DaemonSets feed the same NR account · alerts → Zenduty webhook</text>

    <!-- Mini flow on the right -->
    <g transform="translate(800,18)">
      <rect x="0" y="0" width="120" height="32" rx="4" fill="#0f1419" stroke="#5DEAA0" stroke-width="1"/>
      <text x="60" y="20" fill="#5DEAA0" font-size="10" text-anchor="middle">NEW RELIC</text>
      <path d="M 130,16 L 175,16" stroke="#5DEAA0" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
      <rect x="180" y="0" width="120" height="32" rx="4" fill="#0f1419" stroke="#5DEAA0" stroke-width="1"/>
      <text x="240" y="20" fill="#5DEAA0" font-size="10" text-anchor="middle">ZENDUTY</text>
      <path d="M 310,16 L 355,16" stroke="#5DEAA0" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
      <rect x="360" y="0" width="40" height="32" rx="4" fill="#0f1419" stroke="#5DEAA0" stroke-width="1"/>
      <text x="380" y="20" fill="#e6e6e6" font-size="10" text-anchor="middle">📟</text>
