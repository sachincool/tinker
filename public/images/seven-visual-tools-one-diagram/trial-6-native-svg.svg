<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" font-family="'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0f1a"/>
      <stop offset="100%" stop-color="#0f1419"/>
    </linearGradient>
    <marker id="arrowOrange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ff9900"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5deaa0"/>
    </marker>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1400" height="900" fill="url(#bg)"/>

  <!-- Title -->
  <text x="700" y="44" fill="#e6e6e6" font-size="20" font-weight="700" text-anchor="middle" letter-spacing="2">EKS MULTI-CLUSTER · ARGOCD HUB-SPOKE · TRUEFOUNDRY</text>
  <text x="700" y="68" fill="#7a8595" font-size="11" text-anchor="middle" letter-spacing="3">3 CLUSTERS · ~40 MICROSERVICES · ~150 WORKLOADS</text>

  <!-- ArgoCD Hub badge (top center) -->
  <g transform="translate(620,100)">
    <rect width="160" height="56" rx="6" fill="#1a2332" stroke="#ff9900" stroke-width="2" filter="url(#glow)"/>
    <text x="80" y="24" fill="#ff9900" font-size="11" font-weight="700" text-anchor="middle" letter-spacing="2">ARGOCD HUB</text>
    <text x="80" y="42" fill="#e6e6e6" font-size="10" text-anchor="middle">App-of-Apps · GitOps</text>
  </g>

  <!-- Cluster: us-east-2 (HUB host) -->
  <g transform="translate(60,200)">
    <rect width="380" height="500" rx="8" fill="#111923" stroke="#3FB1E2" stroke-width="1.5"/>
    <rect x="0" y="0" width="380" height="34" fill="#3FB1E2" fill-opacity="0.12"/>
    <text x="14" y="22" fill="#3FB1E2" font-size="12" font-weight="700">VPC · us-east-2</text>
    <text x="366" y="22" fill="#7a8595" font-size="10" text-anchor="end">10.0.0.0/16</text>
    <text x="14" y="58" fill="#e6e6e6" font-size="14" font-weight="700">prod-master</text>
    <text x="14" y="78" fill="#7a8595" font-size="10">HUB CLUSTER · primary control plane</text>

    <!-- ArgoCD pod inside hub cluster -->
    <g transform="translate(14,98)">
      <rect width="352" height="64" rx="4" fill="#0f1419" stroke="#ff9900" stroke-width="1"/>
      <text x="12" y="22" fill="#ff9900" font-size="11" font-weight="700">argocd</text>
      <text x="12" y="40" fill="#bdc8d4" font-size="10">application-controller · repo-server · server</text>
      <text x="12" y="56" fill="#7a8595" font-size="9">syncs to all 3 spokes via cluster-secret refs</text>
    </g>

    <!-- Karpenter -->
    <g transform="translate(14,180)">
      <rect width="352" height="56" rx="4" fill="#0f1419" stroke="#3FB1E2" stroke-width="1"/>
      <text x="12" y="22" fill="#3FB1E2" font-size="11" font-weight="700">karpenter</text>
      <text x="12" y="40" fill="#bdc8d4" font-size="10">NodePool: spot · NodePool: on-demand</text>
    </g>

    <!-- KEDA -->
    <g transform="translate(14,254)">
      <rect width="352" height="56" rx="4" fill="#0f1419" stroke="#5DEAA0" stroke-width="1"/>
      <text x="12" y="22" fill="#5DEAA0" font-size="11" font-weight="700">keda</text>
      <text x="12" y="40" fill="#bdc8d4" font-size="10">ScaledObject → agent-orchestrator</text>
