      <text x="12" y="22" fill="#8C4FFF" font-size="11" font-weight="700">workloads</text>
      <text x="12" y="40" fill="#bdc8d4" font-size="10">~13 microservices · ~45 pods</text>
      <text x="12" y="58" fill="#7a8595" font-size="9">regional replicas of core services</text>
    </g>
    <g transform="translate(14,422)">
