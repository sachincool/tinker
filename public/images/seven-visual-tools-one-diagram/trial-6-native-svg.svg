      <rect x="540" y="-6" width="10" height="10" fill="#3FB1E2"/><text x="556" y="3" fill="#bdc8d4">COMPUTE</text>
      <rect x="620" y="-6" width="10" height="10" fill="#8C4FFF"/><text x="636" y="3" fill="#bdc8d4">WORKLOADS</text>
      <rect x="710" y="-6" width="10" height="10" fill="#5DEAA0"/><text x="726" y="3" fill="#bdc8d4">OBSERVABILITY</text>
      <rect x="810" y="-6" width="10" height="10" fill="#ff9900"/><text x="826" y="3" fill="#bdc8d4">GITOPS</text>
