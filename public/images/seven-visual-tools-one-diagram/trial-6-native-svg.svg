      <text x="12" y="40" fill="#bdc8d4" font-size="10">receives App-of-Apps manifests from hub</text>
    </g>
    <g transform="translate(14,180)">
      <rect width="352" height="56" rx="4" fill="#0f1419" stroke="#3FB1E2" stroke-width="1"/>
      <text x="12" y="22" fill="#3FB1E2" font-size="11" font-weight="700">karpenter</text>
      <text x="12" y="40" fill="#bdc8d4" font-size="10">NodePool: spot · NodePool: on-demand</text>
    </g>
    <g transform="translate(14,254)">
      <rect width="352" height="56" rx="4" fill="#0f1419" stroke="#5DEAA0" stroke-width="1"/>
      <text x="12" y="22" fill="#5DEAA0" font-size="11" font-weight="700">keda</text>
      <text x="12" y="40" fill="#bdc8d4" font-size="10">ScaledObject → agent-orchestrator</text>
    </g>
    <g transform="translate(14,328)">
      <rect width="352" height="76" rx="4" fill="#0f1419" stroke="#8C4FFF" stroke-width="1"/>
      <text x="12" y="22" fill="#8C4FFF" font-size="11" font-weight="700">workloads</text>
      <text x="12" y="40" fill="#bdc8d4" font-size="10">~12 microservices · ~45 pods</text>
      <text x="12" y="58" fill="#7a8595" font-size="9">regional replicas of core services</text>
    </g>
    <g transform="translate(14,422)">
      <rect width="352" height="56" rx="4" fill="#0f1419" stroke="#5DEAA0" stroke-width="1" stroke-dasharray="2,2"/>
      <text x="12" y="22" fill="#5DEAA0" font-size="11" font-weight="700">newrelic-agent</text>
      <text x="12" y="40" fill="#bdc8d4" font-size="10">DaemonSet · APM + infra · → single account</text>
    </g>
