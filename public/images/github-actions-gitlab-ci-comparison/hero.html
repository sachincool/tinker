<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>github actions vs gitlab ci, side by side</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --color-paper:   #11141c;
      --color-paper-2: #161a24;
      --color-ink:     #ecedf0;
      --color-muted:   #8a93a6;
      --color-soft:    #5c6478;
      --color-rule:    rgba(236,237,240,0.10);
      --color-gha:     #c79bff;
      --color-glab:    #fc8a4d;
      --font-sans:     'Geist', system-ui, sans-serif;
      --font-serif:    'Instrument Serif', serif;
      --font-mono:     'Geist Mono', ui-monospace, monospace;
    }

    html, body { background: var(--color-paper); }

    body {
      font-family: var(--font-sans);
      color: var(--color-ink);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 2rem;
    }

    .frame { max-width: 1520px; width: 100%; }

    .eyebrow {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--color-muted);
      margin-bottom: 0.55rem;
    }

    h1 {
      font-family: var(--font-serif);
      font-size: clamp(1.8rem, 2.8vw + 0.75rem, 2.6rem);
      font-weight: 400;
      letter-spacing: -0.015em;
      line-height: 1.15;
      color: var(--color-ink);
      margin-bottom: 1.6rem;
    }

    figcaption {
      font-family: var(--font-serif);
      font-style: italic;
      font-size: 1.05rem;
      color: var(--color-muted);
      margin-top: 1rem;
      letter-spacing: -0.005em;
    }

    svg { width: 100%; display: block; }
  </style>
</head>
<body>
  <div class="frame">
    <p class="eyebrow">Figure · ci platform comparison · ~50 microservices</p>
    <h1>github actions vs gitlab ci, side by side</h1>

    <svg viewBox="0 0 1600 720" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Side-by-side comparison of GitHub Actions and GitLab CI across syntax, runners, caching, secrets, marketplace, and pricing at scale">
      <defs>
        <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
          <circle cx="1" cy="1" r="0.9" fill="rgba(236,237,240,0.05)"/>
        </pattern>
      </defs>

      <rect width="100%" height="100%" fill="#11141c"/>
      <rect width="100%" height="100%" fill="url(#dots)" opacity="0.7"/>

      <!-- ============ Column headers ============ -->
      <!-- Row label gutter -->
      <text x="80" y="76" fill="#8a93a6" font-size="9" font-family="'Geist Mono', monospace" letter-spacing="0.22em">DIMENSION</text>

      <!-- GHA header block -->
      <text x="540" y="56" fill="#c79bff" font-size="10" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.22em" font-weight="500">PLATFORM · A</text>
      <text x="540" y="92" fill="#ecedf0" font-size="22" font-family="'Geist', sans-serif" text-anchor="middle" font-weight="600">GitHub Actions</text>
      <line x1="320" y1="116" x2="760" y2="116" stroke="#c79bff" stroke-width="1.4" opacity="0.55"/>

      <!-- GLab header block -->
      <text x="1180" y="56" fill="#fc8a4d" font-size="10" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.22em" font-weight="500">PLATFORM · B</text>
      <text x="1180" y="92" fill="#ecedf0" font-size="22" font-family="'Geist', sans-serif" text-anchor="middle" font-weight="600">GitLab CI</text>
      <line x1="960" y1="116" x2="1400" y2="116" stroke="#fc8a4d" stroke-width="1.4" opacity="0.55"/>

      <!-- ============ Row separators ============ -->
      <line x1="80" y1="148" x2="1520" y2="148" stroke="rgba(236,237,240,0.10)" stroke-width="0.8"/>
      <line x1="80" y1="232" x2="1520" y2="232" stroke="rgba(236,237,240,0.06)" stroke-width="0.8"/>
      <line x1="80" y1="316" x2="1520" y2="316" stroke="rgba(236,237,240,0.06)" stroke-width="0.8"/>
      <line x1="80" y1="400" x2="1520" y2="400" stroke="rgba(236,237,240,0.06)" stroke-width="0.8"/>
      <line x1="80" y1="484" x2="1520" y2="484" stroke="rgba(236,237,240,0.06)" stroke-width="0.8"/>
      <line x1="80" y1="568" x2="1520" y2="568" stroke="rgba(236,237,240,0.06)" stroke-width="0.8"/>

      <!-- Vertical divider between columns -->
      <line x1="860" y1="148" x2="860" y2="568" stroke="rgba(236,237,240,0.10)" stroke-width="0.8" stroke-dasharray="2,4"/>

      <!-- ============ ROW 1 · syntax ============ -->
      <text x="80" y="184" fill="#8a93a6" font-size="9" font-family="'Geist Mono', monospace" letter-spacing="0.18em">01 · SYNTAX</text>
      <text x="80" y="208" fill="#ecedf0" font-size="14" font-family="'Geist', sans-serif" font-weight="600">configuration shape</text>
      <!-- GHA -->
      <text x="320" y="186" fill="#ecedf0" font-size="13" font-family="'Geist', sans-serif" font-weight="500">jobs · steps · uses</text>
      <text x="320" y="208" fill="#8a93a6" font-size="11" font-family="'Geist', sans-serif">nested YAML, action-first.</text>
      <text x="320" y="224" fill="#5c6478" font-size="9.5" font-family="'Geist Mono', monospace" letter-spacing="0.02em">.github/workflows/*.yml</text>
      <!-- GLab -->
      <text x="960" y="186" fill="#ecedf0" font-size="13" font-family="'Geist', sans-serif" font-weight="500">stages · script</text>
      <text x="960" y="208" fill="#8a93a6" font-size="11" font-family="'Geist', sans-serif">flat YAML, shell-first.</text>
      <text x="960" y="224" fill="#5c6478" font-size="9.5" font-family="'Geist Mono', monospace" letter-spacing="0.02em">.gitlab-ci.yml</text>

      <!-- ============ ROW 2 · runners ============ -->
      <text x="80" y="268" fill="#8a93a6" font-size="9" font-family="'Geist Mono', monospace" letter-spacing="0.18em">02 · RUNNERS</text>
      <text x="80" y="292" fill="#ecedf0" font-size="14" font-family="'Geist', sans-serif" font-weight="600">where the job runs</text>
      <!-- GHA -->
      <text x="320" y="270" fill="#ecedf0" font-size="13" font-family="'Geist', sans-serif" font-weight="500">hosted by default, self-hosted opt-in</text>
      <text x="320" y="292" fill="#8a93a6" font-size="11" font-family="'Geist', sans-serif">linux/mac/windows pool, no docker-in-docker fuss.</text>
      <text x="320" y="308" fill="#5c6478" font-size="9.5" font-family="'Geist Mono', monospace" letter-spacing="0.02em">runs-on: ubuntu-latest</text>
      <!-- GLab -->
      <text x="960" y="270" fill="#ecedf0" font-size="13" font-family="'Geist', sans-serif" font-weight="500">bring-your-own runner culture</text>
      <text x="960" y="292" fill="#8a93a6" font-size="11" font-family="'Geist', sans-serif">docker executor first-class; shared runners exist but smaller.</text>
      <text x="960" y="308" fill="#5c6478" font-size="9.5" font-family="'Geist Mono', monospace" letter-spacing="0.02em">image: node:20</text>

      <!-- ============ ROW 3 · caching ============ -->
      <text x="80" y="352" fill="#8a93a6" font-size="9" font-family="'Geist Mono', monospace" letter-spacing="0.18em">03 · CACHING</text>
      <text x="80" y="376" fill="#ecedf0" font-size="14" font-family="'Geist', sans-serif" font-weight="600">what survives between runs</text>
      <!-- GHA -->
      <text x="320" y="354" fill="#ecedf0" font-size="13" font-family="'Geist', sans-serif" font-weight="500">actions/cache + setup-* defaults</text>
      <text x="320" y="376" fill="#8a93a6" font-size="11" font-family="'Geist', sans-serif">opaque blob store, hash-keyed. mostly works.</text>
      <text x="320" y="392" fill="#5c6478" font-size="9.5" font-family="'Geist Mono', monospace" letter-spacing="0.02em">key: ${{ hashFiles('lock') }}</text>
      <!-- GLab -->
      <text x="960" y="354" fill="#ecedf0" font-size="13" font-family="'Geist', sans-serif" font-weight="500">cache + artifacts, you pick paths</text>
      <text x="960" y="376" fill="#8a93a6" font-size="11" font-family="'Geist', sans-serif">explicit, more knobs, easier to footgun.</text>
      <text x="960" y="392" fill="#5c6478" font-size="9.5" font-family="'Geist Mono', monospace" letter-spacing="0.02em">cache: { paths: [node_modules/] }</text>

      <!-- ============ ROW 4 · secrets ============ -->
      <text x="80" y="436" fill="#8a93a6" font-size="9" font-family="'Geist Mono', monospace" letter-spacing="0.18em">04 · SECRETS</text>
      <text x="80" y="460" fill="#ecedf0" font-size="14" font-family="'Geist', sans-serif" font-weight="600">how creds reach the job</text>
      <!-- GHA -->
      <text x="320" y="438" fill="#ecedf0" font-size="13" font-family="'Geist', sans-serif" font-weight="500">repo / org / environment scopes</text>
      <text x="320" y="460" fill="#8a93a6" font-size="11" font-family="'Geist', sans-serif">OIDC to AWS/GCP is the win — short-lived creds, no static keys.</text>
      <text x="320" y="476" fill="#5c6478" font-size="9.5" font-family="'Geist Mono', monospace" letter-spacing="0.02em">id-token: write</text>
      <!-- GLab -->
      <text x="960" y="438" fill="#ecedf0" font-size="13" font-family="'Geist', sans-serif" font-weight="500">project / group / instance vars</text>
      <text x="960" y="460" fill="#8a93a6" font-size="11" font-family="'Geist', sans-serif">protected + masked flags, JWT to cloud also supported.</text>
      <text x="960" y="476" fill="#5c6478" font-size="9.5" font-family="'Geist Mono', monospace" letter-spacing="0.02em">CI_JOB_JWT_V2</text>

      <!-- ============ ROW 5 · marketplace ============ -->
      <text x="80" y="520" fill="#8a93a6" font-size="9" font-family="'Geist Mono', monospace" letter-spacing="0.18em">05 · ECOSYSTEM</text>
      <text x="80" y="544" fill="#ecedf0" font-size="14" font-family="'Geist', sans-serif" font-weight="600">reusable building blocks</text>
      <!-- GHA -->
      <text x="320" y="522" fill="#ecedf0" font-size="13" font-family="'Geist', sans-serif" font-weight="500">marketplace, thousands of actions</text>
      <text x="320" y="544" fill="#8a93a6" font-size="11" font-family="'Geist', sans-serif">deep, lively, sometimes a supply-chain liability.</text>
      <text x="320" y="560" fill="#5c6478" font-size="9.5" font-family="'Geist Mono', monospace" letter-spacing="0.02em">uses: actions/checkout@v4</text>
      <!-- GLab -->
      <text x="960" y="522" fill="#ecedf0" font-size="13" font-family="'Geist', sans-serif" font-weight="500">includes + components, smaller pool</text>
      <text x="960" y="544" fill="#8a93a6" font-size="11" font-family="'Geist', sans-serif">fewer plug-and-play parts; you write more shell.</text>
      <text x="960" y="560" fill="#5c6478" font-size="9.5" font-family="'Geist Mono', monospace" letter-spacing="0.02em">include: { project: ... }</text>

      <!-- ============ ROW 6 · pricing — FOCAL ============ -->
      <!-- Focal tint across the whole row -->
      <rect x="80" y="568" width="1440" height="92" fill="rgba(252,138,77,0.05)"/>
      <text x="80" y="604" fill="#fc8a4d" font-size="9" font-family="'Geist Mono', monospace" letter-spacing="0.18em" font-weight="500">06 · PRICING AT 50 SERVICES</text>
      <text x="80" y="628" fill="#ecedf0" font-size="14" font-family="'Geist', sans-serif" font-weight="600">where the bill actually lands</text>
      <text x="80" y="648" fill="#8a93a6" font-size="10.5" font-family="'Geist', sans-serif" font-style="italic">the row that decided it for us.</text>
      <!-- GHA -->
      <text x="320" y="606" fill="#ecedf0" font-size="13" font-family="'Geist', sans-serif" font-weight="500">per-minute on hosted, free on self-hosted</text>
      <text x="320" y="628" fill="#8a93a6" font-size="11" font-family="'Geist', sans-serif">minutes burn fast across many repos. macOS minutes hurt the most.</text>
      <text x="320" y="644" fill="#5c6478" font-size="9.5" font-family="'Geist Mono', monospace" letter-spacing="0.02em">ubuntu 1× · macos 10× · windows 2×</text>
      <!-- GLab -->
      <text x="960" y="606" fill="#ecedf0" font-size="13" font-family="'Geist', sans-serif" font-weight="500">CI minutes per tier, unlimited on self-managed</text>
      <text x="960" y="628" fill="#8a93a6" font-size="11" font-family="'Geist', sans-serif">cheaper if you already host runners; group-level quotas keep teams honest.</text>
      <text x="960" y="644" fill="#5c6478" font-size="9.5" font-family="'Geist Mono', monospace" letter-spacing="0.02em">compute minutes per namespace</text>

      <!-- Bottom rule -->
      <line x1="80" y1="664" x2="1520" y2="664" stroke="rgba(236,237,240,0.10)" stroke-width="0.8"/>

      <!-- Legend strip -->
      <text x="80" y="692" fill="#8a93a6" font-size="9" font-family="'Geist Mono', monospace" letter-spacing="0.22em">LEGEND</text>
      <rect x="160" y="684" width="10" height="10" rx="2" fill="rgba(199,155,255,0.12)" stroke="#c79bff" stroke-width="1"/>
      <text x="178" y="693" fill="#bfc4cf" font-size="10.5" font-family="'Geist', sans-serif">github actions column</text>
      <rect x="402" y="684" width="10" height="10" rx="2" fill="rgba(252,138,77,0.12)" stroke="#fc8a4d" stroke-width="1"/>
      <text x="420" y="693" fill="#bfc4cf" font-size="10.5" font-family="'Geist', sans-serif">gitlab ci column</text>
      <rect x="618" y="684" width="10" height="10" rx="2" fill="rgba(252,138,77,0.05)" stroke="#fc8a4d" stroke-width="1" stroke-dasharray="3,3"/>
      <text x="636" y="693" fill="#bfc4cf" font-size="10.5" font-family="'Geist', sans-serif">focal row · the one that moved the needle</text>
      <text x="1196" y="693" fill="#8a93a6" font-size="10" font-family="'Geist', sans-serif" font-style="italic">notes from ~50 production microservices.</text>
    </svg>

    <figcaption>two YAMLs, two billing models, one team trying to ship on a Thursday.</figcaption>
  </div>
</body>
</html>
