<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>credentials in the wild</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --color-paper:   #11141c;
      --color-paper-2: #161a24;
      --color-ink:     #ecedf0;
      --color-muted:   #8a93a6;
      --color-soft:    #5c6478;
      --color-rule:    rgba(236,237,240,0.10);
      --color-coral:   #ff6b5a;
      --color-cyan:    #5bc0d9;
      --color-green:   #7ec98f;
      --font-sans:     'Geist', system-ui, sans-serif;
      --font-serif:    'Instrument Serif', serif;
      --font-mono:     'Geist Mono', ui-monospace, monospace;
    }

    html, body { background: var(--color-paper); }

    body {
      font-family: var(--font-sans);
      color: var(--color-ink);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2.5rem 2rem;
    }

    .frame { max-width: 2400px; width: 100%; }

    .eyebrow {
      font-family: var(--font-mono);
      font-size: 1rem;
      font-weight: 500;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--color-muted);
      margin-bottom: 0.8rem;
    }

    h1 {
      font-family: var(--font-serif);
      font-size: clamp(1.8rem, 2.8vw + 0.75rem, 4rem);
      font-weight: 400;
      letter-spacing: -0.015em;
      line-height: 1.15;
      color: var(--color-ink);
      margin-bottom: 2rem;
    }

    figcaption {
      font-family: var(--font-serif);
      font-style: italic;
      font-size: 1.5rem;
      color: var(--color-muted);
      margin-top: 1.5rem;
      letter-spacing: -0.005em;
    }

    svg { width: 100%; display: block; }
  </style>
</head>
<body>
  <div class="frame">
    <p class="eyebrow">Figure 1  ·  where your PATs actually live  ·  Lazy SRE's guide</p>
    <h1>credentials in the wild</h1>

    <svg viewBox="0 0 1600 1000" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Editorial map of nine places a typical engineering credential lives, grouped into three concentric rings: on disk, in cloud, in someone else's possession.">
      <defs>
        <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
          <circle cx="1" cy="1" r="0.9" fill="rgba(236,237,240,0.05)"/>
        </pattern>
        <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="rgba(236,237,240,0.04)"/>
          <stop offset="100%" stop-color="rgba(236,237,240,0)"/>
        </radialGradient>
      </defs>

      <!-- Background -->
      <rect width="100%" height="100%" fill="#11141c"/>
      <rect width="100%" height="100%" fill="url(#dots)" opacity="0.7"/>

      <!--
        Map center: (800, 480)
        Ring radii: 200 / 340 / 460
      -->

      <!-- Concentric rings (drawn first, behind nodes) -->
      <circle cx="800" cy="480" r="460" fill="none" stroke="rgba(236,237,240,0.10)" stroke-width="1" stroke-dasharray="2,5"/>
      <circle cx="800" cy="480" r="340" fill="none" stroke="rgba(236,237,240,0.12)" stroke-width="1" stroke-dasharray="2,5"/>
      <circle cx="800" cy="480" r="200" fill="none" stroke="rgba(236,237,240,0.15)" stroke-width="1" stroke-dasharray="2,5"/>

      <!-- Centerpoint -->
      <circle cx="800" cy="480" r="44" fill="url(#centerGlow)"/>
      <circle cx="800" cy="480" r="3" fill="rgba(236,237,240,0.30)"/>
      <text x="800" y="448" fill="#5c6478" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.22em">ONE CREDENTIAL</text>
      <text x="800" y="508" fill="#5c6478" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.22em">ONE HUMAN</text>

      <!-- =====================================
           RING LABELS (right edge, mono small-caps)
           Placed in dead space above/between nodes on the right.
           ===================================== -->
      <!-- RING 03 — outer ring (radius 460). Label tucked top-right corner. -->
      <line x1="1320" y1="120" x2="1520" y2="120" stroke="rgba(236,237,240,0.10)" stroke-width="0.8"/>
      <text x="1520" y="112" fill="#8a93a6" font-size="11" font-family="'Geist Mono', monospace" text-anchor="end" letter-spacing="0.22em">RING 03  ·  IN SOMEONE ELSE'S POSSESSION</text>

      <!-- RING 02 — middle ring (radius 340). Right of center, between top-right node and middle-right node -->
      <line x1="1400" y1="544" x2="1520" y2="544" stroke="rgba(236,237,240,0.10)" stroke-width="0.8"/>
      <text x="1520" y="536" fill="#8a93a6" font-size="11" font-family="'Geist Mono', monospace" text-anchor="end" letter-spacing="0.22em">RING 02  ·  IN CLOUD</text>

      <!-- RING 01 — inner ring (radius 200). Label tucked between middle and outer node on right -->
      <line x1="1440" y1="664" x2="1520" y2="664" stroke="rgba(236,237,240,0.10)" stroke-width="0.8"/>
      <text x="1520" y="656" fill="#8a93a6" font-size="11" font-family="'Geist Mono', monospace" text-anchor="end" letter-spacing="0.22em">RING 01  ·  ON DISK</text>

      <!-- =====================================
           NODES
           Layout angles around center (800, 480):
             Inner ring (r≈140 from center):
               1. ~.zshrc           — top-left   (656, 376)
               2. ~.netrc           — top-right  (944, 376)
               3. .env stale repo   — bottom-left(640, 584)  [CORAL]
               4. Mac Keychain      — bottom-right(944, 584)
             Middle ring (r≈300):
               5. CI secret store, orphaned — left  (508, 420)  [CORAL]
               6. Browser-cached session    — right (1092, 420)
               7. Password manager          — bottom-center(792, 776)
             Outer ring (r≈430):
               8. Slack DM history          — top-left  (456, 220)  [CORAL]
               9. Post-it on monitor, 2022  — bottom-right(1160, 716) [CORAL]
                  (also placing one outer-top-right for slack/post balance — actually we have only 2 outer nodes)
           ===================================== -->

      <!-- ============================
           NODE 1 — ~.zshrc (cyan, on disk)
           Position: (640, 360)
           ============================ -->
      <rect x="540" y="320" width="200" height="80" rx="6" fill="#11141c"/>
      <rect x="540" y="320" width="200" height="80" rx="6" fill="rgba(91,192,217,0.04)" stroke="#5bc0d9" stroke-width="1.2"/>
      <rect x="552" y="332" width="56" height="14" rx="2" fill="transparent" stroke="rgba(91,192,217,0.40)" stroke-width="0.8"/>
      <text x="580" y="342" fill="rgba(91,192,217,0.8)" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.14em">ON DISK</text>
      <text x="640" y="372" fill="#ecedf0" font-size="14" font-weight="600" font-family="'Geist Mono', monospace" text-anchor="middle">~/.zshrc</text>
      <text x="640" y="390" fill="#8a93a6" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">export GH_TOKEN=ghp_•••</text>

      <!-- ============================
           NODE 2 — ~.netrc (cyan, on disk)
           Position: (960, 360)
           ============================ -->
      <rect x="860" y="320" width="200" height="80" rx="6" fill="#11141c"/>
      <rect x="860" y="320" width="200" height="80" rx="6" fill="rgba(91,192,217,0.04)" stroke="#5bc0d9" stroke-width="1.2"/>
      <rect x="872" y="332" width="56" height="14" rx="2" fill="transparent" stroke="rgba(91,192,217,0.40)" stroke-width="0.8"/>
      <text x="900" y="342" fill="rgba(91,192,217,0.8)" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.14em">ON DISK</text>
      <text x="960" y="372" fill="#ecedf0" font-size="14" font-weight="600" font-family="'Geist Mono', monospace" text-anchor="middle">~/.netrc</text>
      <text x="960" y="390" fill="#8a93a6" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">machine github.com  login •••</text>

      <!-- ============================
           NODE 3 — .env in stale repo (CORAL, on disk)
           Position: (632, 600)
           ============================ -->
      <rect x="532" y="560" width="200" height="80" rx="6" fill="#11141c"/>
      <rect x="532" y="560" width="200" height="80" rx="6" fill="rgba(255,107,90,0.05)" stroke="#ff6b5a" stroke-width="1.2"/>
      <rect x="544" y="572" width="84" height="14" rx="2" fill="transparent" stroke="rgba(255,107,90,0.45)" stroke-width="0.8"/>
      <text x="586" y="582" fill="rgba(255,107,90,0.9)" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.14em">IN GIT HISTORY</text>
      <text x="632" y="612" fill="#ecedf0" font-size="14" font-weight="600" font-family="'Geist Mono', monospace" text-anchor="middle">.env in stale repo</text>
      <text x="632" y="630" fill="#8a93a6" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">STRIPE_KEY=sk_live_•••  ·  staging</text>

      <!-- ============================
           NODE 4 — Mac Keychain (cyan, on disk)
           Position: (968, 600)
           ============================ -->
      <rect x="868" y="560" width="200" height="80" rx="6" fill="#11141c"/>
      <rect x="868" y="560" width="200" height="80" rx="6" fill="rgba(91,192,217,0.04)" stroke="#5bc0d9" stroke-width="1.2"/>
      <rect x="880" y="572" width="80" height="14" rx="2" fill="transparent" stroke="rgba(91,192,217,0.40)" stroke-width="0.8"/>
      <text x="920" y="582" fill="rgba(91,192,217,0.8)" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.14em">OS-MANAGED</text>
      <text x="968" y="612" fill="#ecedf0" font-size="14" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">mac keychain</text>
      <text x="968" y="630" fill="#8a93a6" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">2 duplicates · 1 expired in 2023</text>

      <!-- ============================
           NODE 5 — CI secret store, orphaned (CORAL, middle ring left)
           Position: (380, 432)
           ============================ -->
      <rect x="252" y="392" width="256" height="80" rx="6" fill="#11141c"/>
      <rect x="252" y="392" width="256" height="80" rx="6" fill="rgba(255,107,90,0.05)" stroke="#ff6b5a" stroke-width="1.2"/>
      <rect x="264" y="404" width="60" height="14" rx="2" fill="transparent" stroke="rgba(255,107,90,0.45)" stroke-width="0.8"/>
      <text x="294" y="414" fill="rgba(255,107,90,0.9)" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.14em">ORPHANED</text>
      <text x="380" y="444" fill="#ecedf0" font-size="14" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">ci secret store</text>
      <text x="380" y="462" fill="#8a93a6" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">workflow deleted 6 months ago · secret survived</text>

      <!-- ============================
           NODE 6 — Browser-cached session (cyan, middle ring right)
           Position: (1220, 432)
           ============================ -->
      <rect x="1092" y="392" width="256" height="80" rx="6" fill="#11141c"/>
      <rect x="1092" y="392" width="256" height="80" rx="6" fill="rgba(91,192,217,0.04)" stroke="#5bc0d9" stroke-width="1.2"/>
      <rect x="1104" y="404" width="64" height="14" rx="2" fill="transparent" stroke="rgba(91,192,217,0.40)" stroke-width="0.8"/>
      <text x="1136" y="414" fill="rgba(91,192,217,0.8)" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.14em">IN CLOUD</text>
      <text x="1220" y="444" fill="#ecedf0" font-size="14" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">browser-cached session</text>
      <text x="1220" y="462" fill="#8a93a6" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">slack · github web · 12 services</text>

      <!-- ============================
           NODE 7 — Password manager (cyan-green, bottom center, middle ring)
           Position: (800, 780)
           THE LEGITIMATE HOME
           ============================ -->
      <rect x="676" y="740" width="248" height="84" rx="6" fill="#11141c"/>
      <rect x="676" y="740" width="248" height="84" rx="6" fill="rgba(126,201,143,0.06)" stroke="#7ec98f" stroke-width="1.4"/>
      <rect x="688" y="752" width="80" height="14" rx="2" fill="transparent" stroke="rgba(126,201,143,0.50)" stroke-width="0.8"/>
      <text x="728" y="762" fill="rgba(126,201,143,0.95)" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.14em">ENCRYPTED</text>
      <text x="800" y="792" fill="#ecedf0" font-size="14" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">password manager</text>
      <text x="800" y="810" fill="#8a93a6" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">1password · bitwarden · the legitimate home</text>

      <!-- ============================
           NODE 8 — Slack DM history (CORAL, outer top-left)
           Position: (320, 200)
           ============================ -->
      <rect x="200" y="160" width="240" height="80" rx="6" fill="#11141c"/>
      <rect x="200" y="160" width="240" height="80" rx="6" fill="rgba(255,107,90,0.05)" stroke="#ff6b5a" stroke-width="1.2"/>
      <rect x="212" y="172" width="76" height="14" rx="2" fill="transparent" stroke="rgba(255,107,90,0.45)" stroke-width="0.8"/>
      <text x="250" y="182" fill="rgba(255,107,90,0.9)" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.14em">SHARED INLINE</text>
      <text x="320" y="212" fill="#ecedf0" font-size="14" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">slack dm history</text>
      <text x="320" y="230" fill="#8a93a6" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">credentials pasted 3 years ago</text>

      <!-- ============================
           NODE 9 — Post-it on monitor, 2022 (CORAL, outer bottom-right)
           Position: (1280, 760)
           ============================ -->
      <rect x="1160" y="720" width="240" height="80" rx="6" fill="#11141c"/>
      <rect x="1160" y="720" width="240" height="80" rx="6" fill="rgba(255,107,90,0.05)" stroke="#ff6b5a" stroke-width="1.2"/>
      <rect x="1172" y="732" width="92" height="14" rx="2" fill="transparent" stroke="rgba(255,107,90,0.45)" stroke-width="0.8"/>
      <text x="1218" y="742" fill="rgba(255,107,90,0.9)" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.14em">PHYSICAL WORLD</text>
      <text x="1280" y="772" fill="#ecedf0" font-size="14" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">post-it on the monitor</text>
      <text x="1280" y="790" fill="#8a93a6" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">office, 2022 · still legible</text>

      <!-- =====================================
           LEGEND STRIP
           ===================================== -->
      <line x1="80" y1="888" x2="1520" y2="888" stroke="rgba(236,237,240,0.10)" stroke-width="0.8"/>
      <text x="80" y="908" fill="#8a93a6" font-size="9" font-family="'Geist Mono', monospace" letter-spacing="0.22em">LEGEND</text>

      <!-- Cyan dot — expected -->
      <circle cx="92" cy="940" r="6" fill="rgba(91,192,217,0.15)" stroke="#5bc0d9" stroke-width="1.4"/>
      <text x="108" y="944" fill="#bfc4cf" font-size="10.5" font-family="'Geist', sans-serif">expected location — present by design</text>

      <!-- Coral dot — actively risky -->
      <circle cx="556" cy="940" r="6" fill="rgba(255,107,90,0.15)" stroke="#ff6b5a" stroke-width="1.4"/>
      <text x="572" y="944" fill="#bfc4cf" font-size="10.5" font-family="'Geist', sans-serif">actively risky — stale, shared, or orphaned</text>

      <!-- Green dot — legitimate home -->
      <circle cx="1080" cy="940" r="6" fill="rgba(126,201,143,0.15)" stroke="#7ec98f" stroke-width="1.4"/>
      <text x="1096" y="944" fill="#bfc4cf" font-size="10.5" font-family="'Geist', sans-serif">the credential's legitimate home</text>

      <!-- Caption underneath -->
      <text x="800" y="976" fill="#ecedf0" font-size="13" font-family="'Instrument Serif', serif" font-style="italic" text-anchor="middle" letter-spacing="-0.005em">most teams have it in all of them simultaneously.</text>
    </svg>

    <figcaption>Fig. 1 — every place a credential hides. most teams have it in all of them simultaneously.</figcaption>
  </div>
</body>
</html>
