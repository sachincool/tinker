<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>two hours from deploy to incident channel</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --color-paper:   #11141c;
      --color-paper-2: #161a24;
      --color-ink:     #ecedf0;
      --color-muted:   #8a93a6;
      --color-soft:    #5c6478;
      --color-rule:    rgba(236,237,240,0.10);
      --color-blast:   #ff6b5a;
      --color-cool:    #5bc0d9;
      --font-sans:     'Geist', system-ui, sans-serif;
      --font-serif:    'Instrument Serif', serif;
      --font-mono:     'Geist Mono', ui-monospace, monospace;
    }

    html, body { background: var(--color-paper); }

    body {
      font-family: var(--font-sans);
      color: var(--color-ink);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2.5rem 2rem;
    }

    .frame { max-width: 1520px; width: 100%; }

    .eyebrow {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--color-muted);
      margin-bottom: 0.6rem;
    }

    h1 {
      font-family: var(--font-serif);
      font-size: clamp(1.8rem, 2.8vw + 0.75rem, 2.6rem);
      font-weight: 400;
      letter-spacing: -0.015em;
      line-height: 1.15;
      color: var(--color-ink);
      margin-bottom: 2rem;
    }

    figcaption {
      font-family: var(--font-serif);
      font-style: italic;
      font-size: 1.05rem;
      color: var(--color-muted);
      margin-top: 1.25rem;
      letter-spacing: -0.005em;
    }

    svg { width: 100%; display: block; }
  </style>
</head>
<body>
  <div class="frame">
    <p class="eyebrow">Figure  ja4 incident timeline</p>
    <h1>two hours from deploy to incident channel</h1>

    <svg viewBox="0 0 1600 760" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Timeline of a JA4 rate-limit deploy that blocked 30 percent of legitimate Chrome traffic in under two hours">
      <defs>
        <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
          <circle cx="1" cy="1" r="0.9" fill="rgba(236,237,240,0.05)"/>
        </pattern>
        <marker id="arrow-soft" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="#5c6478"/>
        </marker>
      </defs>

      <rect width="100%" height="100%" fill="#11141c"/>
      <rect width="100%" height="100%" fill="url(#dots)" opacity="0.7"/>

      <!-- Phase labels (background, ghosted) -->
      <text x="80" y="120" fill="rgba(91,192,217,0.10)" font-size="68" font-weight="600" font-family="'Geist Mono', monospace" letter-spacing="0.04em">CONFIDENT</text>
      <text x="780" y="120" fill="rgba(255,107,90,0.10)" font-size="68" font-weight="600" font-family="'Geist Mono', monospace" letter-spacing="0.04em">REGRET</text>

      <!-- Phase divider (between stage 2 and stage 3) -->
      <line x1="540" y1="320" x2="540" y2="500" stroke="rgba(236,237,240,0.10)" stroke-width="1" stroke-dasharray="3,4"/>
      <text x="540" y="312" fill="#5c6478" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.18em">FIRST PAGE</text>

      <!-- Timeline baseline -->
      <line x1="120" y1="410" x2="1480" y2="410" stroke="rgba(236,237,240,0.18)" stroke-width="1"/>

      <!-- Start / end caps -->
      <line x1="120" y1="402" x2="120" y2="418" stroke="rgba(236,237,240,0.25)" stroke-width="1"/>
      <line x1="1480" y1="402" x2="1480" y2="418" stroke="rgba(236,237,240,0.25)" stroke-width="1"/>

      <!-- Connector segments — colored by phase. Drawn first so nodes overlap them. -->
      <line x1="140" y1="410" x2="380" y2="410" stroke="#5bc0d9" stroke-width="1.4" opacity="0.65"/>
      <line x1="400" y1="410" x2="640" y2="410" stroke="#5bc0d9" stroke-width="1.4" opacity="0.65"/>
      <line x1="660" y1="410" x2="900" y2="410" stroke="#ff6b5a" stroke-width="1.4" opacity="0.65"/>
      <line x1="920" y1="410" x2="1160" y2="410" stroke="#ff6b5a" stroke-width="1.4" opacity="0.65"/>
      <line x1="1180" y1="410" x2="1420" y2="410" stroke="#ff6b5a" stroke-width="1.4" opacity="0.65"/>

      <!-- ============ STAGE 1  T-3D  Suspicious fingerprint spotted (confident) ============ -->
      <text x="260" y="248" fill="#5bc0d9" font-size="10" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.22em" font-weight="500">T3D</text>
      <line x1="260" y1="264" x2="260" y2="392" stroke="rgba(91,192,217,0.30)" stroke-width="1" stroke-dasharray="2,3"/>
      <text x="260" y="296" fill="#ecedf0" font-size="16" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">one fingerprint,</text>
      <text x="260" y="316" fill="#ecedf0" font-size="16" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">weird traffic shape</text>
      <circle cx="260" cy="410" r="14" fill="#11141c" stroke="#5bc0d9" stroke-width="2"/>
      <circle cx="260" cy="410" r="5" fill="#5bc0d9"/>
      <text x="260" y="364" fill="#5bc0d9" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.18em">01</text>
      <text x="260" y="464" fill="#8a93a6" font-size="11" font-family="'Geist', sans-serif" text-anchor="middle">high request rate, suspicious timing.</text>
      <text x="260" y="480" fill="#8a93a6" font-size="11" font-family="'Geist', sans-serif" text-anchor="middle">looks like one bad actor.</text>
      <text x="260" y="504" fill="#5c6478" font-size="10" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.02em">t13d1516h2_8daaf6152771</text>
      <text x="260" y="518" fill="#5c6478" font-size="10" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.02em">_02713d6af862</text>

      <!-- ============ STAGE 2  T-0  Rule deployed (confident) ============ -->
      <text x="520" y="248" fill="#5bc0d9" font-size="10" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.22em" font-weight="500">T0  2:00 PM</text>
      <line x1="520" y1="264" x2="520" y2="392" stroke="rgba(91,192,217,0.30)" stroke-width="1" stroke-dasharray="2,3"/>
      <text x="520" y="296" fill="#ecedf0" font-size="16" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">rate-limit rule</text>
      <text x="520" y="316" fill="#ecedf0" font-size="16" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">deployed to prod</text>
      <circle cx="520" cy="410" r="14" fill="#11141c" stroke="#5bc0d9" stroke-width="2"/>
      <circle cx="520" cy="410" r="5" fill="#5bc0d9"/>
      <text x="520" y="364" fill="#5bc0d9" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.18em">02</text>
      <text x="520" y="464" fill="#8a93a6" font-size="11" font-family="'Geist', sans-serif" text-anchor="middle">if ja4 == X, rate limit hard.</text>
      <text x="520" y="480" fill="#8a93a6" font-size="11" font-family="'Geist', sans-serif" text-anchor="middle">CI green. ship it.</text>
      <text x="520" y="504" fill="#5c6478" font-size="10" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.02em">canary skipped:</text>
      <text x="520" y="518" fill="#5c6478" font-size="10" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.02em">it's just a wafrule</text>

      <!-- ============ STAGE 3  T+30m  Support tickets land (regret) ============ -->
      <text x="780" y="248" fill="#ff6b5a" font-size="10" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.22em" font-weight="500">T+30M  2:30 PM</text>
      <line x1="780" y1="264" x2="780" y2="392" stroke="rgba(255,107,90,0.30)" stroke-width="1" stroke-dasharray="2,3"/>
      <text x="780" y="296" fill="#ecedf0" font-size="16" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">support tickets</text>
      <text x="780" y="316" fill="#ecedf0" font-size="16" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">start landing</text>
      <circle cx="780" cy="410" r="14" fill="#11141c" stroke="#ff6b5a" stroke-width="2"/>
      <circle cx="780" cy="410" r="5" fill="#ff6b5a"/>
      <text x="780" y="364" fill="#ff6b5a" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.18em">03</text>
      <text x="780" y="464" fill="#8a93a6" font-size="11" font-family="'Geist', sans-serif" text-anchor="middle">"site won't load on chrome."</text>
      <text x="780" y="480" fill="#8a93a6" font-size="11" font-family="'Geist', sans-serif" text-anchor="middle">"checkout returns 429."</text>
      <text x="780" y="504" fill="#5c6478" font-size="10" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.02em">429 spike, isolated to</text>
      <text x="780" y="518" fill="#5c6478" font-size="10" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.02em">chrome 119 / windows</text>

      <!-- ============ STAGE 4  T+1h  Order volume drops 30% (regret) ============ -->
      <text x="1040" y="248" fill="#ff6b5a" font-size="10" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.22em" font-weight="500">T+1H  3:00 PM</text>
      <line x1="1040" y1="264" x2="1040" y2="392" stroke="rgba(255,107,90,0.30)" stroke-width="1" stroke-dasharray="2,3"/>
      <text x="1040" y="296" fill="#ecedf0" font-size="16" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">orders drop 30%</text>
      <circle cx="1040" cy="410" r="14" fill="#11141c" stroke="#ff6b5a" stroke-width="2"/>
      <circle cx="1040" cy="410" r="5" fill="#ff6b5a"/>
      <text x="1040" y="364" fill="#ff6b5a" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.18em">04</text>
      <text x="1040" y="464" fill="#8a93a6" font-size="11" font-family="'Geist', sans-serif" text-anchor="middle">revenue dashboards go red.</text>
      <text x="1040" y="480" fill="#8a93a6" font-size="11" font-family="'Geist', sans-serif" text-anchor="middle">on-call gets paged.</text>
      <text x="1040" y="504" fill="#5c6478" font-size="10" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.02em">~$50k in lost</text>
      <text x="1040" y="518" fill="#5c6478" font-size="10" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.02em">checkout volume</text>

      <!-- ============ STAGE 5  T+2h  Rule reverted (regret) ============ -->
      <text x="1300" y="248" fill="#ff6b5a" font-size="10" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.22em" font-weight="500">T+2H  4:00 PM</text>
      <line x1="1300" y1="264" x2="1300" y2="392" stroke="rgba(255,107,90,0.30)" stroke-width="1" stroke-dasharray="2,3"/>
      <text x="1300" y="296" fill="#ecedf0" font-size="16" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">rule reverted,</text>
      <text x="1300" y="316" fill="#ecedf0" font-size="16" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">i write the postmortem</text>
      <circle cx="1300" cy="410" r="14" fill="#11141c" stroke="#ff6b5a" stroke-width="2"/>
      <circle cx="1300" cy="410" r="5" fill="#ff6b5a"/>
      <text x="1300" y="364" fill="#ff6b5a" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.18em">05</text>
      <text x="1300" y="464" fill="#8a93a6" font-size="11" font-family="'Geist', sans-serif" text-anchor="middle">traffic recovers in minutes.</text>
      <text x="1300" y="480" fill="#8a93a6" font-size="11" font-family="'Geist', sans-serif" text-anchor="middle">dignity does not.</text>
      <text x="1300" y="504" fill="#5c6478" font-size="10" font-family="'Geist Mono', monospace" text-anchor="middle" font-style="italic" letter-spacing="0.02em">root cause: ja4 fingerprints</text>
      <text x="1300" y="518" fill="#5c6478" font-size="10" font-family="'Geist Mono', monospace" text-anchor="middle" font-style="italic" letter-spacing="0.02em">identify stacks, not users</text>

      <!-- Annotation: the 30% bracket -->
      <line x1="660" y1="600" x2="1180" y2="600" stroke="rgba(255,107,90,0.35)" stroke-width="1"/>
      <line x1="660" y1="592" x2="660" y2="608" stroke="rgba(255,107,90,0.35)" stroke-width="1"/>
      <line x1="1180" y1="592" x2="1180" y2="608" stroke="rgba(255,107,90,0.35)" stroke-width="1"/>
      <rect x="836" y="588" width="168" height="20" fill="#11141c"/>
      <text x="920" y="602" fill="#ff6b5a" font-size="10" font-family="'Instrument Serif', serif" font-style="italic" text-anchor="middle">every chrome 119 user on windows, blocked</text>

      <!-- Legend strip -->
      <line x1="80" y1="660" x2="1520" y2="660" stroke="rgba(236,237,240,0.10)" stroke-width="0.8"/>
      <text x="80" y="680" fill="#8a93a6" font-size="9" font-family="'Geist Mono', monospace" letter-spacing="0.22em">LEGEND</text>

      <circle cx="92" cy="708" r="6" fill="#11141c" stroke="#5bc0d9" stroke-width="2"/>
      <circle cx="92" cy="708" r="2.5" fill="#5bc0d9"/>
      <text x="108" y="712" fill="#bfc4cf" font-size="10.5" font-family="'Geist', sans-serif">confident phase  decision and deploy felt safe</text>

      <circle cx="552" cy="708" r="6" fill="#11141c" stroke="#ff6b5a" stroke-width="2"/>
      <circle cx="552" cy="708" r="2.5" fill="#ff6b5a"/>
      <text x="568" y="712" fill="#bfc4cf" font-size="10.5" font-family="'Geist', sans-serif">regret phase  the same rule, now with revenue impact</text>

      <text x="1080" y="712" fill="#8a93a6" font-size="10.5" font-family="'Geist', sans-serif" font-style="italic">timestamps are real, spacing is sequential not proportional.</text>
    </svg>

    <figcaption>one fingerprint looked like one attacker. it was a tls stack used by 30% of customers.</figcaption>
  </div>
</body>
</html>
