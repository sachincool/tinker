<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>safe-chain, in one picture</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --paper:   #0d1117;
      --paper-2: #161b22;
      --ink:     #e6edf3;
      --muted:   #8b949e;
      --soft:    #6e7681;
      --rule:    rgba(230,237,243,0.10);
      --cyan:    #5bc0d9;
      --cyan-tint: rgba(91,192,217,0.10);
      --red:     #ff6b5a;
      --red-tint: rgba(255,107,90,0.10);
      --green:   #7ec98f;
      --green-tint: rgba(126,201,143,0.10);
      --font-sans:  'Geist', system-ui, sans-serif;
      --font-serif: 'Instrument Serif', serif;
      --font-mono:  'Geist Mono', ui-monospace, monospace;
    }
    html, body { background: var(--paper); }
    body {
      font-family: var(--font-sans);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2.5rem 2rem;
    }
    .frame { max-width: 1480px; width: 100%; }
    .eyebrow {
      font-family: var(--font-mono);
      font-size: 0.66rem;
      font-weight: 500;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }
    h1 {
      font-family: var(--font-serif);
      font-size: clamp(1.6rem, 2.4vw + 0.75rem, 2.1rem);
      font-weight: 400;
      letter-spacing: -0.01em;
      line-height: 1.15;
      color: var(--ink);
      margin-bottom: 1.25rem;
    }
    figcaption {
      font-family: var(--font-serif);
      font-style: italic;
      font-size: 0.98rem;
      color: var(--muted);
      margin-top: 0.5rem;
      max-width: 880px;
      line-height: 1.5;
    }
    svg { width: 100%; display: block; }
  </style>
</head>
<body>
  <div class="frame">
    <p class="eyebrow">Lazy Security · Part 1 · Supply Chain</p>
    <h1>safe-chain, in one picture</h1>

    <svg viewBox="0 0 1600 760" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="safe-chain flow diagram">
      <defs>
        <marker id="arrow-cyan" markerWidth="9" markerHeight="7" refX="7" refY="3.5" orient="auto">
          <polygon points="0 0, 8 3.5, 0 7" fill="#5bc0d9"/>
        </marker>
        <marker id="arrow-red" markerWidth="9" markerHeight="7" refX="7" refY="3.5" orient="auto">
          <polygon points="0 0, 8 3.5, 0 7" fill="#ff6b5a"/>
        </marker>
        <marker id="arrow-green" markerWidth="9" markerHeight="7" refX="7" refY="3.5" orient="auto">
          <polygon points="0 0, 8 3.5, 0 7" fill="#7ec98f"/>
        </marker>
        <marker id="arrow-muted" markerWidth="9" markerHeight="7" refX="7" refY="3.5" orient="auto">
          <polygon points="0 0, 8 3.5, 0 7" fill="#8b949e"/>
        </marker>
      </defs>

      <!-- Background -->
      <rect width="100%" height="100%" fill="#0d1117"/>

      <!-- Column eyebrows (top) -->
      <text x="160" y="64" fill="#6e7681" font-size="10" font-family="'Geist Mono', monospace" letter-spacing="0.20em" text-anchor="middle">01 · DEVELOPER</text>
      <text x="416" y="64" fill="#6e7681" font-size="10" font-family="'Geist Mono', monospace" letter-spacing="0.20em" text-anchor="middle">02 · SHELL ALIAS</text>
      <text x="720" y="64" fill="#6e7681" font-size="10" font-family="'Geist Mono', monospace" letter-spacing="0.20em" text-anchor="middle">03 · LOCAL PROXY</text>
      <text x="1024" y="64" fill="#6e7681" font-size="10" font-family="'Geist Mono', monospace" letter-spacing="0.20em" text-anchor="middle">04 · AIKIDO INTEL</text>
      <text x="1376" y="64" fill="#6e7681" font-size="10" font-family="'Geist Mono', monospace" letter-spacing="0.20em" text-anchor="middle">05 · OUTCOME</text>

      <!-- Hairline baseline beneath eyebrows -->
      <line x1="60" y1="80" x2="1540" y2="80" stroke="rgba(230,237,243,0.08)" stroke-width="0.8"/>

      <!--
        Spine layout:
          col 1: 96..224  (w=128)
          col 2: 352..480 (w=128)  shell alias
          col 3: 624..816 (w=192)  local proxy (wider — the hub)
          col 4: 960..1088 (w=128) aikido intel cloud
          col 5: 1240..1512 (w=272) outcome — split into two stacked cards
        Center spine y = 380
      -->

      <!-- =====================================
           ARROWS FIRST (drawn behind boxes)
           ===================================== -->

      <!-- col1 → col2 (cyan, primary flow) -->
      <line x1="224" y1="380" x2="352" y2="380" stroke="#5bc0d9" stroke-width="1.4" marker-end="url(#arrow-cyan)"/>
      <rect x="252" y="360" width="72" height="14" rx="2" fill="#0d1117"/>
      <text x="288" y="371" fill="#5bc0d9" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.10em">npm install</text>

      <!-- col2 → col3 (cyan) -->
      <line x1="480" y1="380" x2="624" y2="380" stroke="#5bc0d9" stroke-width="1.4" marker-end="url(#arrow-cyan)"/>
      <rect x="512" y="360" width="80" height="14" rx="2" fill="#0d1117"/>
      <text x="552" y="371" fill="#5bc0d9" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.10em">intercepted</text>

      <!-- col3 ↑ col4 (query out, cyan) -->
      <line x1="700" y1="324" x2="1008" y2="220" stroke="#5bc0d9" stroke-width="1.4" marker-end="url(#arrow-cyan)"/>
      <rect x="800" y="248" width="92" height="14" rx="2" fill="#0d1117"/>
      <text x="846" y="259" fill="#5bc0d9" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.10em">lookup hash</text>

      <!-- col4 ↓ col3 (verdict back, dashed muted) -->
      <line x1="1008" y1="260" x2="740" y2="328" stroke="#8b949e" stroke-width="1.2" stroke-dasharray="5,4" marker-end="url(#arrow-muted)"/>
      <rect x="830" y="312" width="80" height="14" rx="2" fill="#0d1117"/>
      <text x="870" y="323" fill="#8b949e" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.10em">verdict</text>

      <!-- col3 → col5 top (green, allowed) -->
      <path d="M 816 348 C 1000 348, 1100 256, 1240 256"
            fill="none" stroke="#7ec98f" stroke-width="1.6" marker-end="url(#arrow-green)"/>
      <rect x="1056" y="276" width="72" height="14" rx="2" fill="#0d1117"/>
      <text x="1092" y="287" fill="#7ec98f" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.10em">allowed</text>

      <!-- col3 → col5 bottom (red, blocked) -->
      <path d="M 816 412 C 1000 412, 1100 504, 1240 504"
            fill="none" stroke="#ff6b5a" stroke-width="1.6" marker-end="url(#arrow-red)"/>
      <rect x="1148" y="516" width="72" height="14" rx="2" fill="#0d1117"/>
      <text x="1184" y="527" fill="#ff6b5a" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.10em">blocked</text>

      <!-- =====================================
           NODES
           ===================================== -->

      <!-- COL 1 — Developer terminal -->
      <rect x="96" y="316" width="128" height="128" rx="6" fill="#0d1117"/>
      <rect x="96" y="316" width="128" height="128" rx="6" fill="rgba(230,237,243,0.03)" stroke="rgba(230,237,243,0.30)" stroke-width="1"/>
      <rect x="108" y="328" width="40" height="14" rx="2" fill="transparent" stroke="rgba(139,148,158,0.55)" stroke-width="0.8"/>
      <text x="128" y="338" fill="#8b949e" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.10em">SHELL</text>
      <!-- terminal glyph: prompt + caret -->
      <text x="120" y="392" fill="#5bc0d9" font-size="22" font-family="'Geist Mono', monospace" font-weight="500">&gt;_</text>
      <text x="160" y="416" fill="#e6edf3" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">developer terminal</text>
      <text x="160" y="432" fill="#8b949e" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">~/projects/app</text>

      <!-- Caption under col 1 -->
      <text x="160" y="476" fill="#8b949e" font-size="10" font-family="'Geist Mono', monospace" text-anchor="middle">npm install lodash-utils</text>

      <!-- COL 2 — Shell alias -->
      <rect x="352" y="316" width="128" height="128" rx="6" fill="#0d1117"/>
      <rect x="352" y="316" width="128" height="128" rx="6" fill="rgba(230,237,243,0.03)" stroke="rgba(230,237,243,0.30)" stroke-width="1"/>
      <rect x="364" y="328" width="40" height="14" rx="2" fill="transparent" stroke="rgba(139,148,158,0.55)" stroke-width="0.8"/>
      <text x="384" y="338" fill="#8b949e" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.10em">ALIAS</text>
      <!-- arrow-redirect glyph -->
      <g transform="translate(380, 372)">
        <text x="0" y="0" fill="#e6edf3" font-size="14" font-family="'Geist Mono', monospace" font-weight="500">npm</text>
        <text x="40" y="0" fill="#5bc0d9" font-size="14" font-family="'Geist Mono', monospace">→</text>
        <text x="64" y="0" fill="#e6edf3" font-size="14" font-family="'Geist Mono', monospace" font-weight="500">sc</text>
      </g>
      <text x="416" y="416" fill="#e6edf3" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">shell alias</text>
      <text x="416" y="432" fill="#8b949e" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">.zshrc · .bashrc</text>

      <!-- Caption under col 2 -->
      <text x="416" y="476" fill="#8b949e" font-size="10" font-family="'Geist Mono', monospace" text-anchor="middle">alias intercepts the command</text>

      <!-- COL 3 — Local proxy (FOCAL — wider, cyan-tinted) -->
      <rect x="624" y="300" width="192" height="160" rx="6" fill="#0d1117"/>
      <rect x="624" y="300" width="192" height="160" rx="6" fill="rgba(91,192,217,0.10)" stroke="#5bc0d9" stroke-width="1.2"/>
      <rect x="636" y="312" width="48" height="14" rx="2" fill="transparent" stroke="rgba(91,192,217,0.60)" stroke-width="0.8"/>
      <text x="660" y="322" fill="#5bc0d9" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.10em">PROXY</text>
      <text x="804" y="452" fill="rgba(91,192,217,0.14)" font-size="40" font-weight="600" font-family="'Geist Mono', monospace" text-anchor="end">03</text>

      <!-- proxy "stack" lines -->
      <line x1="652" y1="356" x2="788" y2="356" stroke="rgba(91,192,217,0.45)" stroke-width="0.8"/>
      <line x1="652" y1="372" x2="788" y2="372" stroke="rgba(91,192,217,0.30)" stroke-width="0.8"/>
      <line x1="652" y1="388" x2="788" y2="388" stroke="rgba(91,192,217,0.20)" stroke-width="0.8"/>

      <text x="720" y="412" fill="#e6edf3" font-size="14" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">local proxy</text>
      <text x="720" y="430" fill="#5bc0d9" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">localhost · CI runner</text>

      <!-- Caption under col 3 -->
      <text x="720" y="492" fill="#8b949e" font-size="10" font-family="'Geist Mono', monospace" text-anchor="middle">all package downloads route through here</text>

      <!-- COL 4 — Aikido Intel cloud -->
      <!-- Cloud shape made from overlapping circles + base rect -->
      <g>
        <!-- mask layer -->
        <ellipse cx="1024" cy="180" rx="84" ry="44" fill="#0d1117"/>
        <ellipse cx="980" cy="172" rx="36" ry="28" fill="#0d1117"/>
        <ellipse cx="1068" cy="172" rx="36" ry="28" fill="#0d1117"/>
        <!-- styled layer -->
        <ellipse cx="1024" cy="180" rx="84" ry="44" fill="rgba(230,237,243,0.04)" stroke="rgba(230,237,243,0.35)" stroke-width="1"/>
        <ellipse cx="980" cy="172" rx="36" ry="28" fill="rgba(230,237,243,0.04)" stroke="rgba(230,237,243,0.35)" stroke-width="1"/>
        <ellipse cx="1068" cy="172" rx="36" ry="28" fill="rgba(230,237,243,0.04)" stroke="rgba(230,237,243,0.35)" stroke-width="1"/>
        <!-- clean inner band (cover the seams) -->
        <rect x="952" y="172" width="144" height="44" fill="rgba(230,237,243,0.04)"/>
        <line x1="940" y1="172" x2="1108" y2="172" stroke="rgba(230,237,243,0.18)" stroke-width="0.8"/>
        <line x1="940" y1="224" x2="1108" y2="224" stroke="rgba(230,237,243,0.18)" stroke-width="0.8"/>
      </g>

      <rect x="980" y="148" width="40" height="14" rx="2" fill="#0d1117" stroke="rgba(139,148,158,0.55)" stroke-width="0.8"/>
      <text x="1000" y="158" fill="#8b949e" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.10em">CLOUD</text>

      <text x="1024" y="200" fill="#e6edf3" font-size="13" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Aikido Intel</text>
      <text x="1024" y="216" fill="#8b949e" font-size="9.5" font-family="'Geist Mono', monospace" text-anchor="middle">intel.aikido.dev</text>

      <!-- Caption under col 4 — placed in the row below the proxy, with mask -->
      <rect x="908" y="464" width="232" height="28" fill="#0d1117"/>
      <text x="1024" y="476" fill="#8b949e" font-size="10" font-family="'Geist Mono', monospace" text-anchor="middle">
        <tspan x="1024" dy="0">open malware threat intel,</tspan>
        <tspan x="1024" dy="14">queried in real time</tspan>
      </text>

      <!-- COL 5 — Two stacked outcome cards -->
      <!-- Allowed (green, top) -->
      <rect x="1240" y="216" width="272" height="80" rx="6" fill="#0d1117"/>
      <rect x="1240" y="216" width="272" height="80" rx="6" fill="rgba(126,201,143,0.10)" stroke="#7ec98f" stroke-width="1.2"/>
      <rect x="1252" y="228" width="60" height="14" rx="2" fill="transparent" stroke="rgba(126,201,143,0.55)" stroke-width="0.8"/>
      <text x="1282" y="238" fill="#7ec98f" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.10em">ALLOWED</text>
      <!-- check glyph -->
      <path d="M 1472 244 l 6 6 l 14 -14" fill="none" stroke="#7ec98f" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="1376" y="268" fill="#e6edf3" font-size="13" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">installed</text>
      <text x="1376" y="284" fill="#8b949e" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">package proceeds to disk</text>

      <!-- Blocked (red, bottom) -->
      <rect x="1240" y="464" width="272" height="80" rx="6" fill="#0d1117"/>
      <rect x="1240" y="464" width="272" height="80" rx="6" fill="rgba(255,107,90,0.10)" stroke="#ff6b5a" stroke-width="1.2"/>
      <rect x="1252" y="476" width="60" height="14" rx="2" fill="transparent" stroke="rgba(255,107,90,0.55)" stroke-width="0.8"/>
      <text x="1282" y="486" fill="#ff6b5a" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.10em">BLOCKED</text>
      <!-- x glyph -->
      <g stroke="#ff6b5a" stroke-width="1.6" stroke-linecap="round">
        <line x1="1474" y1="484" x2="1490" y2="500"/>
        <line x1="1490" y1="484" x2="1474" y2="500"/>
      </g>
      <text x="1376" y="516" fill="#e6edf3" font-size="13" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">install aborted</text>
      <text x="1376" y="532" fill="#8b949e" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">deep-dependency match · before postinstall</text>

      <!-- =====================================
           BOTTOM LEGEND
           ===================================== -->
      <line x1="60" y1="624" x2="1540" y2="624" stroke="rgba(230,237,243,0.10)" stroke-width="0.8"/>
      <text x="60" y="644" fill="#8b949e" font-size="9" font-family="'Geist Mono', monospace" letter-spacing="0.22em">LEGEND</text>

      <!-- normal flow -->
      <line x1="160" y1="660" x2="200" y2="660" stroke="#5bc0d9" stroke-width="1.4" marker-end="url(#arrow-cyan)"/>
      <text x="212" y="664" fill="#bfc7d0" font-size="10" font-family="'Geist', sans-serif">normal flow</text>

      <!-- verdict -->
      <line x1="340" y1="660" x2="380" y2="660" stroke="#8b949e" stroke-width="1.2" stroke-dasharray="5,4" marker-end="url(#arrow-muted)"/>
      <text x="392" y="664" fill="#bfc7d0" font-size="10" font-family="'Geist', sans-serif">intel verdict</text>

      <!-- allowed -->
      <line x1="520" y1="660" x2="560" y2="660" stroke="#7ec98f" stroke-width="1.6" marker-end="url(#arrow-green)"/>
      <text x="572" y="664" fill="#bfc7d0" font-size="10" font-family="'Geist', sans-serif">allowed</text>

      <!-- blocked -->
      <line x1="660" y1="660" x2="700" y2="660" stroke="#ff6b5a" stroke-width="1.6" marker-end="url(#arrow-red)"/>
      <text x="712" y="664" fill="#bfc7d0" font-size="10" font-family="'Geist', sans-serif">blocked</text>

      <!-- proxy chip -->
      <rect x="824" y="652" width="16" height="12" rx="2" fill="rgba(91,192,217,0.10)" stroke="#5bc0d9" stroke-width="1"/>
      <text x="848" y="664" fill="#bfc7d0" font-size="10" font-family="'Geist', sans-serif">safe-chain proxy</text>

      <!-- intel chip -->
      <rect x="1004" y="652" width="16" height="12" rx="2" fill="rgba(230,237,243,0.04)" stroke="rgba(230,237,243,0.35)" stroke-width="1"/>
      <text x="1028" y="664" fill="#bfc7d0" font-size="10" font-family="'Geist', sans-serif">external intel</text>

      <!-- colophon -->
      <text x="1540" y="724" fill="#6e7681" font-size="9" font-family="'Geist Mono', monospace" text-anchor="end" letter-spacing="0.14em">HARSHIT.CLOUD · LAZY SECURITY</text>
    </svg>

    <figcaption><em>a local proxy in front of every package manager, checked against an open threat-intel feed. the malware never touches disk.</em></figcaption>
  </div>
</body>
</html>
