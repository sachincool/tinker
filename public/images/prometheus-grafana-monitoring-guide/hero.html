<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>how a Prometheus + Grafana stack actually wires up</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --color-paper:   #11141c;
      --color-paper-2: #161a24;
      --color-ink:     #ecedf0;
      --color-muted:   #8a93a6;
      --color-soft:    #5c6478;
      --color-rule:    rgba(236,237,240,0.10);
      --color-accent:  #ff6b5a;
      --color-data:    #5bc0d9;
      --font-sans:     'Geist', system-ui, sans-serif;
      --font-serif:    'Instrument Serif', serif;
      --font-mono:     'Geist Mono', ui-monospace, monospace;
    }

    html, body { background: var(--color-paper); }

    body {
      font-family: var(--font-sans);
      color: var(--color-ink);
      width: 1600px;
      height: 900px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 2.25rem;
      overflow: hidden;
    }

    .frame { width: 100%; }

    .eyebrow {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--color-muted);
      margin-bottom: 0.55rem;
    }

    h1 {
      font-family: var(--font-serif);
      font-size: 2.4rem;
      font-weight: 400;
      letter-spacing: -0.015em;
      line-height: 1.1;
      color: var(--color-ink);
      margin-bottom: 1.4rem;
    }

    figcaption {
      font-family: var(--font-serif);
      font-style: italic;
      font-size: 1.05rem;
      color: var(--color-muted);
      margin-top: 0.9rem;
      letter-spacing: -0.005em;
    }

    svg { width: 100%; display: block; }
  </style>
</head>
<body>
  <div class="frame">
    <p class="eyebrow">Figure · monitoring stack topology</p>
    <h1>how a Prometheus + Grafana stack actually wires up</h1>

    <svg viewBox="0 0 1520 660" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Architecture of a Prometheus and Grafana monitoring stack: services and exporters scraped by Prometheus, which feeds Alertmanager and Grafana, which page on-call engineers and serve dashboards.">
      <defs>
        <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
          <circle cx="1" cy="1" r="0.9" fill="rgba(236,237,240,0.05)"/>
        </pattern>
        <marker id="arrow-soft" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="#5c6478"/>
        </marker>
        <marker id="arrow-data" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="#5bc0d9"/>
        </marker>
        <marker id="arrow-accent" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="#ff6b5a"/>
        </marker>
      </defs>

      <rect width="100%" height="100%" fill="#11141c"/>
      <rect width="100%" height="100%" fill="url(#dots)" opacity="0.7"/>

      <!-- Tier labels (background, ghosted) -->
      <text x="80" y="80" fill="rgba(91,192,217,0.10)" font-size="48" font-weight="600" font-family="'Geist Mono', monospace" letter-spacing="0.04em">SCRAPE</text>
      <text x="1180" y="80" fill="rgba(255,107,90,0.10)" font-size="48" font-weight="600" font-family="'Geist Mono', monospace" letter-spacing="0.04em">REACT</text>

      <!-- Tier divider rules -->
      <line x1="380" y1="120" x2="380" y2="540" stroke="rgba(236,237,240,0.08)" stroke-width="1" stroke-dasharray="3,4"/>
      <text x="380" y="112" fill="#5c6478" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.18em">EXPOSE</text>
      <line x1="700" y1="120" x2="700" y2="540" stroke="rgba(236,237,240,0.08)" stroke-width="1" stroke-dasharray="3,4"/>
      <text x="700" y="112" fill="#5c6478" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.18em">PULL</text>
      <line x1="1100" y1="120" x2="1100" y2="540" stroke="rgba(236,237,240,0.08)" stroke-width="1" stroke-dasharray="3,4"/>
      <text x="1100" y="112" fill="#5c6478" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.18em">FAN OUT</text>

      <!-- ===== Connectors (drawn before boxes so z-order works) ===== -->

      <!-- services -> exporters (sublines) -->
      <line x1="220" y1="220" x2="420" y2="220" stroke="#5bc0d9" stroke-width="1.2" opacity="0.55" marker-end="url(#arrow-data)"/>
      <line x1="220" y1="340" x2="420" y2="340" stroke="#5bc0d9" stroke-width="1.2" opacity="0.55" marker-end="url(#arrow-data)"/>
      <line x1="220" y1="460" x2="420" y2="460" stroke="#5bc0d9" stroke-width="1.2" opacity="0.55" marker-end="url(#arrow-data)"/>

      <!-- exporters -> Prometheus (3 lines converging) -->
      <path d="M 580 220 C 660 220, 660 330, 740 330" fill="none" stroke="#5bc0d9" stroke-width="1.4" opacity="0.7" marker-end="url(#arrow-data)"/>
      <line x1="580" y1="340" x2="740" y2="340" stroke="#5bc0d9" stroke-width="1.4" opacity="0.7" marker-end="url(#arrow-data)"/>
      <path d="M 580 460 C 660 460, 660 350, 740 350" fill="none" stroke="#5bc0d9" stroke-width="1.4" opacity="0.7" marker-end="url(#arrow-data)"/>

      <!-- Prometheus -> Alertmanager -->
      <path d="M 940 300 C 1020 300, 1020 230, 1140 230" fill="none" stroke="#ff6b5a" stroke-width="1.4" opacity="0.85" marker-end="url(#arrow-accent)"/>
      <!-- Prometheus -> Grafana (query, dashed back-and-forth represented as one query line) -->
      <path d="M 940 380 C 1020 380, 1020 450, 1140 450" fill="none" stroke="#5c6478" stroke-width="1.2" opacity="0.85" stroke-dasharray="4,3" marker-end="url(#arrow-soft)"/>

      <!-- Alertmanager -> on-call -->
      <line x1="1300" y1="230" x2="1430" y2="230" stroke="#ff6b5a" stroke-width="1.4" opacity="0.85" marker-end="url(#arrow-accent)"/>
      <!-- Grafana -> humans (eyes) -->
      <line x1="1300" y1="450" x2="1430" y2="450" stroke="#5c6478" stroke-width="1.2" opacity="0.7" marker-end="url(#arrow-soft)"/>

      <!-- ===== Tier 1: Services (left) ===== -->

      <!-- mask + box: webapp -->
      <rect x="80" y="180" width="140" height="80" rx="6" fill="#11141c"/>
      <rect x="80" y="180" width="140" height="80" rx="6" fill="rgba(236,237,240,0.03)" stroke="rgba(236,237,240,0.30)" stroke-width="1"/>
      <rect x="88" y="186" width="40" height="12" rx="2" fill="transparent" stroke="rgba(236,237,240,0.30)" stroke-width="0.8"/>
      <text x="108" y="195" fill="#8a93a6" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.10em">SERVICE</text>
      <text x="150" y="226" fill="#ecedf0" font-size="13" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">web app</text>
      <text x="150" y="244" fill="#8a93a6" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">/metrics :8080</text>

      <!-- node host -->
      <rect x="80" y="300" width="140" height="80" rx="6" fill="#11141c"/>
      <rect x="80" y="300" width="140" height="80" rx="6" fill="rgba(236,237,240,0.03)" stroke="rgba(236,237,240,0.30)" stroke-width="1"/>
      <rect x="88" y="306" width="40" height="12" rx="2" fill="transparent" stroke="rgba(236,237,240,0.30)" stroke-width="0.8"/>
      <text x="108" y="315" fill="#8a93a6" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.10em">HOST</text>
      <text x="150" y="346" fill="#ecedf0" font-size="13" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">linux box</text>
      <text x="150" y="364" fill="#8a93a6" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">cpu · mem · disk</text>

      <!-- external (HTTP probe target) -->
      <rect x="80" y="420" width="140" height="80" rx="6" fill="#11141c"/>
      <rect x="80" y="420" width="140" height="80" rx="6" fill="rgba(236,237,240,0.03)" stroke="rgba(236,237,240,0.30)" stroke-width="1" stroke-dasharray="4,3"/>
      <rect x="88" y="426" width="40" height="12" rx="2" fill="transparent" stroke="rgba(236,237,240,0.30)" stroke-width="0.8"/>
      <text x="108" y="435" fill="#8a93a6" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.10em">PROBE</text>
      <text x="150" y="466" fill="#ecedf0" font-size="13" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">public URL</text>
      <text x="150" y="484" fill="#8a93a6" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">https · tcp · icmp</text>

      <!-- ===== Tier 2: Exporters ===== -->

      <!-- client lib (in-process) -->
      <rect x="420" y="180" width="160" height="80" rx="6" fill="#11141c"/>
      <rect x="420" y="180" width="160" height="80" rx="6" fill="rgba(91,192,217,0.06)" stroke="rgba(91,192,217,0.50)" stroke-width="1"/>
      <rect x="428" y="186" width="56" height="12" rx="2" fill="transparent" stroke="rgba(91,192,217,0.50)" stroke-width="0.8"/>
      <text x="456" y="195" fill="#5bc0d9" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.10em">CLIENT LIB</text>
      <text x="500" y="226" fill="#ecedf0" font-size="13" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">prom-client</text>
      <text x="500" y="244" fill="#8a93a6" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">counters · histograms</text>

      <!-- node_exporter -->
      <rect x="420" y="300" width="160" height="80" rx="6" fill="#11141c"/>
      <rect x="420" y="300" width="160" height="80" rx="6" fill="rgba(91,192,217,0.06)" stroke="rgba(91,192,217,0.50)" stroke-width="1"/>
      <rect x="428" y="306" width="56" height="12" rx="2" fill="transparent" stroke="rgba(91,192,217,0.50)" stroke-width="0.8"/>
      <text x="456" y="315" fill="#5bc0d9" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.10em">EXPORTER</text>
      <text x="500" y="346" fill="#ecedf0" font-size="13" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">node_exporter</text>
      <text x="500" y="364" fill="#8a93a6" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">:9100/metrics</text>

      <!-- blackbox_exporter -->
      <rect x="420" y="420" width="160" height="80" rx="6" fill="#11141c"/>
      <rect x="420" y="420" width="160" height="80" rx="6" fill="rgba(91,192,217,0.06)" stroke="rgba(91,192,217,0.50)" stroke-width="1"/>
      <rect x="428" y="426" width="56" height="12" rx="2" fill="transparent" stroke="rgba(91,192,217,0.50)" stroke-width="0.8"/>
      <text x="456" y="435" fill="#5bc0d9" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.10em">EXPORTER</text>
      <text x="500" y="466" fill="#ecedf0" font-size="13" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">blackbox_exporter</text>
      <text x="500" y="484" fill="#8a93a6" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">:9115/probe</text>

      <!-- ===== Tier 3: Prometheus (focal) ===== -->

      <rect x="740" y="240" width="200" height="200" rx="6" fill="#11141c"/>
      <rect x="740" y="240" width="200" height="200" rx="6" fill="rgba(255,107,90,0.06)" stroke="#ff6b5a" stroke-width="1.4"/>
      <rect x="748" y="248" width="48" height="12" rx="2" fill="transparent" stroke="rgba(255,107,90,0.55)" stroke-width="0.8"/>
      <text x="772" y="257" fill="#ff6b5a" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.10em">SERVER</text>
      <text x="840" y="296" fill="#ecedf0" font-size="18" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Prometheus</text>
      <line x1="780" y1="316" x2="900" y2="316" stroke="rgba(236,237,240,0.10)" stroke-width="1"/>

      <!-- internal sub-blocks -->
      <text x="840" y="340" fill="#8a93a6" font-size="10" font-family="'Geist Mono', monospace" text-anchor="middle">scrape loop · 15s</text>
      <text x="840" y="360" fill="#8a93a6" font-size="10" font-family="'Geist Mono', monospace" text-anchor="middle">tsdb · 30d retention</text>
      <text x="840" y="380" fill="#8a93a6" font-size="10" font-family="'Geist Mono', monospace" text-anchor="middle">rule eval · alerts/*.yml</text>
      <text x="840" y="400" fill="#8a93a6" font-size="10" font-family="'Geist Mono', monospace" text-anchor="middle">PromQL · :9090</text>

      <text x="840" y="426" fill="#5c6478" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle" font-style="italic" letter-spacing="0.02em">it pulls. nothing pushes to it.</text>

      <!-- ===== Tier 4: Alertmanager + Grafana ===== -->

      <!-- Alertmanager -->
      <rect x="1140" y="180" width="160" height="100" rx="6" fill="#11141c"/>
      <rect x="1140" y="180" width="160" height="100" rx="6" fill="rgba(255,107,90,0.06)" stroke="rgba(255,107,90,0.55)" stroke-width="1"/>
      <rect x="1148" y="186" width="64" height="12" rx="2" fill="transparent" stroke="rgba(255,107,90,0.55)" stroke-width="0.8"/>
      <text x="1180" y="195" fill="#ff6b5a" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.10em">ROUTER</text>
      <text x="1220" y="232" fill="#ecedf0" font-size="14" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Alertmanager</text>
      <text x="1220" y="252" fill="#8a93a6" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">dedupe · group · silence</text>
      <text x="1220" y="268" fill="#8a93a6" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">:9093</text>

      <!-- Grafana -->
      <rect x="1140" y="400" width="160" height="100" rx="6" fill="#11141c"/>
      <rect x="1140" y="400" width="160" height="100" rx="6" fill="rgba(236,237,240,0.04)" stroke="rgba(236,237,240,0.40)" stroke-width="1"/>
      <rect x="1148" y="406" width="64" height="12" rx="2" fill="transparent" stroke="rgba(236,237,240,0.40)" stroke-width="0.8"/>
      <text x="1180" y="415" fill="#8a93a6" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.10em">DASHBOARD</text>
      <text x="1220" y="452" fill="#ecedf0" font-size="14" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Grafana</text>
      <text x="1220" y="472" fill="#8a93a6" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">PromQL queries</text>
      <text x="1220" y="488" fill="#8a93a6" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">:3000</text>

      <!-- ===== Tier 5: Sinks ===== -->

      <!-- on-call -->
      <rect x="1430" y="190" width="80" height="80" rx="6" fill="#11141c"/>
      <rect x="1430" y="190" width="80" height="80" rx="6" fill="rgba(255,107,90,0.08)" stroke="#ff6b5a" stroke-width="1.4"/>
      <text x="1470" y="232" fill="#ecedf0" font-size="13" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">on-call</text>
      <text x="1470" y="250" fill="#8a93a6" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">slack · pager</text>

      <!-- humans -->
      <rect x="1430" y="410" width="80" height="80" rx="6" fill="#11141c"/>
      <rect x="1430" y="410" width="80" height="80" rx="6" fill="rgba(236,237,240,0.04)" stroke="rgba(236,237,240,0.30)" stroke-width="1"/>
      <text x="1470" y="452" fill="#ecedf0" font-size="13" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">humans</text>
      <text x="1470" y="470" fill="#8a93a6" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">at 9am, hopefully</text>

      <!-- Arrow labels -->
      <rect x="282" y="208" width="76" height="14" rx="2" fill="#11141c"/>
      <text x="320" y="218" fill="#5bc0d9" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.06em">/metrics</text>

      <rect x="990" y="244" width="64" height="14" rx="2" fill="#11141c"/>
      <text x="1022" y="254" fill="#ff6b5a" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.10em">FIRING</text>

      <rect x="990" y="430" width="64" height="14" rx="2" fill="#11141c"/>
      <text x="1022" y="440" fill="#8a93a6" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.10em">QUERY</text>

      <rect x="1340" y="216" width="64" height="14" rx="2" fill="#11141c"/>
      <text x="1372" y="226" fill="#ff6b5a" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.10em">PAGE</text>

      <rect x="1340" y="436" width="64" height="14" rx="2" fill="#11141c"/>
      <text x="1372" y="446" fill="#8a93a6" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.10em">VIEW</text>

      <!-- Legend strip -->
      <line x1="80" y1="572" x2="1480" y2="572" stroke="rgba(236,237,240,0.10)" stroke-width="0.8"/>
      <text x="80" y="592" fill="#8a93a6" font-size="9" font-family="'Geist Mono', monospace" letter-spacing="0.22em">LEGEND</text>

      <rect x="80" y="612" width="14" height="10" rx="2" fill="rgba(91,192,217,0.06)" stroke="rgba(91,192,217,0.50)" stroke-width="1"/>
      <text x="104" y="621" fill="#bfc4cf" font-size="10.5" font-family="'Geist', sans-serif">exporter — translates a thing into /metrics</text>

      <rect x="500" y="612" width="14" height="10" rx="2" fill="rgba(255,107,90,0.06)" stroke="#ff6b5a" stroke-width="1.4"/>
      <text x="524" y="621" fill="#bfc4cf" font-size="10.5" font-family="'Geist', sans-serif">core path — the parts that actually wake you up</text>

      <line x1="956" y1="617" x2="980" y2="617" stroke="#5c6478" stroke-width="1.2" stroke-dasharray="4,3"/>
      <text x="990" y="621" fill="#bfc4cf" font-size="10.5" font-family="'Geist', sans-serif">read-only query path — Grafana asking, not telling</text>
    </svg>

    <figcaption>everything pulls toward Prometheus, then fans out into the two things that matter: the page, and the dashboard.</figcaption>
  </div>
</body>
</html>
