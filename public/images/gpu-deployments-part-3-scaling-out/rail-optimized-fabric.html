<!doctype html><html><head><meta charset="utf-8"><style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#e6ddcc;display:flex;justify-content:center;padding:48px;font-family:Georgia,'Times New Roman',serif}
.fig{width:1080px;background:#f4efe6;border:1px solid #cfc4b0;padding:40px 46px 34px}
.eyebrow{font:600 12px/1 ui-monospace,Menlo,monospace;letter-spacing:.2em;text-transform:uppercase;color:#bf4a2e}
.title{font-size:31px;color:#22201c;margin:11px 0 5px;letter-spacing:-.01em}
.sub{font-size:15px;color:#6f6a60;font-style:italic;margin-bottom:18px}
svg{display:block;width:100%}
text{font-family:ui-monospace,Menlo,monospace}
.cap{margin-top:8px;font-size:13px;color:#4a463d;font-style:italic;text-align:center}
.cap b{font-style:normal;font-family:ui-monospace,Menlo,monospace;font-weight:600;color:#bf4a2e}
</style></head><body>
<div class="fig">
  <div class="eyebrow">Multi-node · scale-out fabric</div>
  <div class="title">Rail-optimized fat-tree</div>
  <div class="sub">Each GPU gets its own NIC, a "rail". Rail N of every node lands on the same leaf switch.</div>
  <svg viewBox="0 0 1000 430">
    <!-- spines -->
    <g fill="#efe7d7" stroke="#b8ad98" stroke-width="1.4">
      <rect x="330" y="20" width="150" height="34" rx="4"/><rect x="520" y="20" width="150" height="34" rx="4"/>
    </g>
    <text x="405" y="42" text-anchor="middle" font-size="12" font-weight="600" fill="#5a5348">spine 0</text>
    <text x="595" y="42" text-anchor="middle" font-size="12" font-weight="600" fill="#5a5348">spine 1</text>
    <!-- leaves (one per rail) -->
    <g stroke-width="1.4">
      <rect x="70"  y="150" width="170" height="30" rx="4" fill="#fffdf8" stroke="#bf4a2e"/>
      <rect x="300" y="150" width="170" height="30" rx="4" fill="#fffdf8" stroke="#c3b8a4"/>
      <rect x="530" y="150" width="170" height="30" rx="4" fill="#fffdf8" stroke="#c3b8a4"/>
      <rect x="760" y="150" width="170" height="30" rx="4" fill="#fffdf8" stroke="#c3b8a4"/>
    </g>
    <text x="155" y="170" text-anchor="middle" font-size="11" font-weight="600" fill="#8a4a34">leaf · rail 0</text>
    <text x="385" y="170" text-anchor="middle" font-size="11" fill="#6f6a60">leaf · rail 1</text>
    <text x="615" y="170" text-anchor="middle" font-size="11" fill="#6f6a60">leaf · rail 2</text>
    <text x="845" y="170" text-anchor="middle" font-size="11" fill="#6f6a60">leaf · rail 3</text>
    <!-- leaf-spine links (fat tree, every leaf to every spine) -->
    <g stroke="#d8cdb8" stroke-width="1.1">
      <line x1="155" y1="150" x2="405" y2="54"/><line x1="155" y1="150" x2="595" y2="54"/>
      <line x1="385" y1="150" x2="405" y2="54"/><line x1="385" y1="150" x2="595" y2="54"/>
      <line x1="615" y1="150" x2="405" y2="54"/><line x1="615" y1="150" x2="595" y2="54"/>
      <line x1="845" y1="150" x2="405" y2="54"/><line x1="845" y1="150" x2="595" y2="54"/>
    </g>
    <!-- nodes -->
    <g font-size="11" font-weight="600" fill="#33302a">
      <g fill="#faf6ee" stroke="#c3b8a4" stroke-width="1.3">
        <rect x="60" y="330" width="270" height="60" rx="5"/><rect x="365" y="330" width="270" height="60" rx="5"/><rect x="670" y="330" width="270" height="60" rx="5"/>
      </g>
      <text x="195" y="382" text-anchor="middle" fill="#6f6a60">node 0 · 8 GPU / 8 NIC</text>
      <text x="500" y="382" text-anchor="middle" fill="#6f6a60">node 1 · 8 GPU / 8 NIC</text>
      <text x="805" y="382" text-anchor="middle" fill="#6f6a60">node 2 · 8 GPU / 8 NIC</text>
    </g>
    <!-- NIC dots per node (4 rails shown) -->
    <g>
      <!-- node0 -->
      <circle cx="90" cy="345" r="7" fill="#bf4a2e"/><circle cx="150" cy="345" r="7" fill="#b8ad98"/><circle cx="210" cy="345" r="7" fill="#b8ad98"/><circle cx="270" cy="345" r="7" fill="#b8ad98"/>
      <!-- node1 -->
      <circle cx="395" cy="345" r="7" fill="#bf4a2e"/><circle cx="455" cy="345" r="7" fill="#b8ad98"/><circle cx="515" cy="345" r="7" fill="#b8ad98"/><circle cx="575" cy="345" r="7" fill="#b8ad98"/>
      <!-- node2 -->
      <circle cx="700" cy="345" r="7" fill="#bf4a2e"/><circle cx="760" cy="345" r="7" fill="#b8ad98"/><circle cx="820" cy="345" r="7" fill="#b8ad98"/><circle cx="880" cy="345" r="7" fill="#b8ad98"/>
    </g>
    <!-- rail 0 highlighted: NIC-0 of every node to leaf rail0 -->
    <g stroke="#bf4a2e" stroke-width="1.8">
      <line x1="90" y1="338" x2="140" y2="180"/><line x1="395" y1="338" x2="160" y2="180"/><line x1="700" y1="338" x2="180" y2="180"/>
    </g>
    <!-- other rails muted -->
    <g stroke="#d8cdb8" stroke-width="1.1">
      <line x1="150" y1="338" x2="360" y2="180"/><line x1="455" y1="338" x2="385" y2="180"/><line x1="760" y1="338" x2="410" y2="180"/>
      <line x1="210" y1="338" x2="590" y2="180"/><line x1="515" y1="338" x2="615" y2="180"/><line x1="820" y1="338" x2="640" y2="180"/>
      <line x1="270" y1="338" x2="820" y2="180"/><line x1="575" y1="338" x2="845" y2="180"/><line x1="880" y1="338" x2="870" y2="180"/>
    </g>
  </svg>
  <div class="cap"><b>GPU_i on any node reaches GPU_i on any other node in one switch hop.</b> The GPUs that talk most take the shortest path.</div>
</div>
</body></html>
