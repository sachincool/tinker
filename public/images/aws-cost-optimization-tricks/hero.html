<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AWS bill: $50k -> $20k</title>
  <style>
    body { margin: 0; background: #0D1117; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    #canvas { display: block; }
    #downloadGif { display: none; }
  </style>
</head>
<body>
  <canvas id="canvas" width="900" height="600"></canvas>
  <a id="downloadGif" download="hero.gif">download</a>
<script>
// ============================================================
// GIF ENCODER (self-contained)
// ============================================================
function GIFEncoder(width, height) {
  this.width = width;
  this.height = height;
  this.data = [];
  this.writeByte = function(b) { this.data.push(b & 0xFF); };
  this.writeShort = function(s) { this.writeByte(s & 0xFF); this.writeByte((s >> 8) & 0xFF); };
  this.writeString = function(s) { for (var i = 0; i < s.length; i++) this.writeByte(s.charCodeAt(i)); };
  this.start = function() {
    this.data = [];
    this.writeString('GIF89a');
    this.writeShort(width); this.writeShort(height);
    this.writeByte(0x70); this.writeByte(0); this.writeByte(0);
    this.writeByte(0x21); this.writeByte(0xFF); this.writeByte(0x0B);
    this.writeString('NETSCAPE2.0');
    this.writeByte(0x03); this.writeByte(0x01); this.writeShort(0); this.writeByte(0x00);
  };
  this.addFrame = function(ctx, delay) {
    var imgData = ctx.getImageData(0, 0, width, height);
    var pixels = imgData.data;
    var colorCounts = {};
    for (var i = 0; i < pixels.length; i += 4) {
      var r = pixels[i] & 0xF8, g = pixels[i+1] & 0xF8, b = pixels[i+2] & 0xF8;
      var key = (r << 16) | (g << 8) | b;
      colorCounts[key] = (colorCounts[key] || 0) + 1;
    }
    var sortedColors = Object.keys(colorCounts).map(function(k) {
      return { color: parseInt(k), count: colorCounts[k] };
    }).sort(function(a, b) { return b.count - a.count; }).slice(0, 256);
    var palette = [], colorMap = {};
    for (var i = 0; i < sortedColors.length; i++) {
      var c = sortedColors[i].color;
      palette.push((c >> 16) & 0xFF, (c >> 8) & 0xFF, c & 0xFF);
      colorMap[c] = i;
    }
    while (palette.length < 256 * 3) palette.push(0);
    var indexed = new Uint8Array(width * height);
    for (var i = 0; i < pixels.length; i += 4) {
      var r = pixels[i] & 0xF8, g = pixels[i+1] & 0xF8, b = pixels[i+2] & 0xF8;
      var key = (r << 16) | (g << 8) | b;
      if (colorMap[key] !== undefined) indexed[i/4] = colorMap[key];
      else {
        var bestDist = Infinity, bestIdx = 0;
        for (var j = 0; j < sortedColors.length; j++) {
          var c = sortedColors[j].color;
          var cr = (c >> 16) & 0xFF, cg = (c >> 8) & 0xFF, cb = c & 0xFF;
          var dist = (r-cr)*(r-cr) + (g-cg)*(g-cg) + (b-cb)*(b-cb);
          if (dist < bestDist) { bestDist = dist; bestIdx = j; }
        }
        indexed[i/4] = bestIdx;
      }
    }
    this.writeByte(0x21); this.writeByte(0xF9); this.writeByte(0x04);
    this.writeByte(0x00); this.writeShort(Math.round(delay / 10));
    this.writeByte(0x00); this.writeByte(0x00);
    this.writeByte(0x2C); this.writeShort(0); this.writeShort(0);
    this.writeShort(width); this.writeShort(height); this.writeByte(0x87);
    for (var i = 0; i < palette.length; i++) this.writeByte(palette[i]);
    this.writeByte(8); this.lzwEncode(indexed); this.writeByte(0x00);
  };
  this.lzwEncode = function(pixels) {
    var clearCode = 256, eoiCode = 257, codeSize = 9, nextCode = 258;
    var dict = {}, buffer = 0, bufferLen = 0, output = [];
    var emit = function(code) {
      buffer |= code << bufferLen; bufferLen += codeSize;
      while (bufferLen >= 8) { output.push(buffer & 0xFF); buffer >>= 8; bufferLen -= 8; }
    };
    emit(clearCode); var prev = pixels[0];
    for (var i = 1; i < pixels.length; i++) {
      var curr = pixels[i], key = prev + ',' + curr;
      if (dict[key] !== undefined) prev = dict[key];
      else {
        emit(prev);
        if (nextCode < 4096) { dict[key] = nextCode++; if (nextCode > (1 << codeSize) && codeSize < 12) codeSize++; }
        else { emit(clearCode); dict = {}; codeSize = 9; nextCode = 258; }
        prev = curr;
      }
    }
    emit(prev); emit(eoiCode);
    if (bufferLen > 0) output.push(buffer & 0xFF);
    for (var i = 0; i < output.length; i += 255) {
      var chunk = output.slice(i, Math.min(i + 255, output.length));
      this.writeByte(chunk.length);
      for (var j = 0; j < chunk.length; j++) this.writeByte(chunk[j]);
    }
  };
  this.finish = function() {
    this.writeByte(0x3B);
    return new Blob([new Uint8Array(this.data)], {type: 'image/gif'});
  };
}

// ============================================================
// CONFIG
// ============================================================
var WIDTH = 900;
var HEIGHT = 600;
var BG = '#0D1117';
var TEXT = '#E6EDF3';
var MUTED = '#8B949E';
var GRID = '#21262D';
var BEFORE_COLOR = '#F78166'; // orange — "the bill before"
var AFTER_COLOR  = '#3FB950'; // green — "the bill after"
var ACCENT = '#58A6FF';

// Per-service before/after from the post's receipts table
var DATA = [
  { label: 'EC2',           start: 28, end: 12  },
  { label: 'RDS',           start: 12, end: 7   },
  { label: 'Data transfer', start: 6,  end: 2.5 },
  { label: 'CloudWatch',    start: 2,  end: 0.5 },
  { label: 'Other',         start: 2,  end: 1   },
  { label: 'TOTAL bill',    start: 50, end: 20  }
];

var ANIMATION = {
  totalFrames: 32,
  holdFrames: 24,
  frameDelay: 60,
  holdDelay: 90
};

// ============================================================
// RENDER
// ============================================================
function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }
function fmt(v) {
  if (v >= 10) return '$' + Math.round(v) + 'k';
  return '$' + v.toFixed(1).replace(/\.0$/, '') + 'k';
}

function renderFrame(ctx, progress) {
  var eased = easeOutCubic(progress);

  // background
  ctx.fillStyle = BG;
  ctx.fillRect(0, 0, WIDTH, HEIGHT);

  // title
  ctx.fillStyle = TEXT;
  ctx.font = 'bold 30px -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';
  ctx.fillText('AWS bill: $50k/mo → $20k/mo', 60, 36);

  // subtitle
  ctx.fillStyle = MUTED;
  ctx.font = '15px -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif';
  ctx.fillText('Per-service before → after, three months in.', 60, 76);

  // legend (top right)
  var legendY = 50;
  ctx.beginPath();
  ctx.arc(WIDTH - 230, legendY, 7, 0, Math.PI * 2);
  ctx.fillStyle = BEFORE_COLOR; ctx.fill();
  ctx.fillStyle = TEXT;
  ctx.font = '13px Arial';
  ctx.textBaseline = 'middle';
  ctx.fillText('before', WIDTH - 218, legendY);

  ctx.beginPath();
  ctx.arc(WIDTH - 140, legendY, 7, 0, Math.PI * 2);
  ctx.fillStyle = AFTER_COLOR; ctx.fill();
  ctx.fillStyle = TEXT;
  ctx.fillText('after', WIDTH - 128, legendY);

  // plot area
  var plot = {
    x: 200,
    y: 130,
    width: WIDTH - 200 - 90,
    height: HEIGHT - 130 - 80
  };

  // value range
  var maxV = 50;
  var minV = 0;

  // gridlines + x-axis labels
  ctx.strokeStyle = GRID;
  ctx.lineWidth = 1;
  ctx.setLineDash([3, 4]);
  ctx.fillStyle = MUTED;
  ctx.font = '11px Arial';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  for (var g = 0; g <= 5; g++) {
    var gx = plot.x + (plot.width / 5) * g;
    ctx.beginPath();
    ctx.moveTo(gx, plot.y - 6);
    ctx.lineTo(gx, plot.y + plot.height + 4);
    ctx.stroke();
    var v = minV + (maxV - minV) * (g / 5);
    ctx.fillText('$' + Math.round(v) + 'k', gx, plot.y + plot.height + 10);
  }
  ctx.setLineDash([]);

  // dumbbells
  var rowH = plot.height / DATA.length;
  for (var i = 0; i < DATA.length; i++) {
    var item = DATA[i];
    var rowProgress = Math.min(1, Math.max(0, (eased - i * 0.07) * 1.7));
    if (rowProgress <= 0) continue;

    var y = plot.y + i * rowH + rowH / 2;
    var isTotal = item.label === 'TOTAL bill';

    // label (left)
    ctx.fillStyle = isTotal ? TEXT : MUTED;
    ctx.font = isTotal ? 'bold 14px Arial' : '13px Arial';
    ctx.textAlign = 'right';
    ctx.textBaseline = 'middle';
    ctx.globalAlpha = rowProgress;
    ctx.fillText(item.label, plot.x - 18, y);
    ctx.globalAlpha = 1;

    var startX = plot.x + ((item.start - minV) / (maxV - minV)) * plot.width;
    var endX   = plot.x + ((item.end   - minV) / (maxV - minV)) * plot.width;

    // animate end dot (and the connecting bar fill) collapsing leftward toward "after"
    var animEndX = startX + (endX - startX) * rowProgress;

    // separator between line items and the total
    if (isTotal) {
      ctx.strokeStyle = GRID;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(plot.x - 110, y - rowH / 2 + 4);
      ctx.lineTo(plot.x + plot.width + 30, y - rowH / 2 + 4);
      ctx.stroke();
    }

    var dotR = isTotal ? 11 : 8;

    // background "rail" between the two dots
    ctx.strokeStyle = GRID;
    ctx.lineWidth = isTotal ? 6 : 4;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(startX, y);
    ctx.lineTo(endX, y);
    ctx.stroke();

    // animated "savings" bar that shrinks from start toward end
    var grad = ctx.createLinearGradient(animEndX, 0, startX, 0);
    grad.addColorStop(0, 'rgba(63,185,80,0.55)');
    grad.addColorStop(1, 'rgba(247,129,102,0.55)');
    ctx.strokeStyle = grad;
    ctx.lineWidth = isTotal ? 7 : 5;
    ctx.beginPath();
    ctx.moveTo(animEndX, y);
    ctx.lineTo(startX, y);
    ctx.stroke();

    // start dot (orange — "before")
    ctx.beginPath();
    ctx.arc(startX, y, dotR * Math.min(1, rowProgress * 1.4), 0, Math.PI * 2);
    ctx.fillStyle = BEFORE_COLOR;
    ctx.fill();
    ctx.strokeStyle = BG;
    ctx.lineWidth = 2;
    ctx.stroke();

    // end dot (green — "after")
    ctx.beginPath();
    ctx.arc(animEndX, y, dotR * Math.min(1, rowProgress * 1.4), 0, Math.PI * 2);
    ctx.fillStyle = AFTER_COLOR;
    ctx.fill();
    ctx.strokeStyle = BG;
    ctx.lineWidth = 2;
    ctx.stroke();

    // value labels — only after dots fully placed
    if (rowProgress > 0.85) {
      ctx.globalAlpha = (rowProgress - 0.85) / 0.15;
      ctx.font = isTotal ? 'bold 13px Arial' : '12px Arial';
      ctx.textBaseline = 'middle';

      var pxGap = Math.abs(startX - animEndX);
      var stacked = pxGap < 36; // overlap threshold for value labels

      // before value
      ctx.fillStyle = BEFORE_COLOR;
      ctx.textAlign = stacked ? 'left' : 'center';
      ctx.fillText(fmt(item.start), stacked ? startX + dotR + 6 : startX, y - dotR - 11);

      // after value
      ctx.fillStyle = AFTER_COLOR;
      ctx.textAlign = stacked ? 'right' : 'center';
      ctx.fillText(fmt(item.end), stacked ? animEndX - dotR - 6 : animEndX, y - dotR - 11);

      // savings delta (right side)
      var saved = item.start - item.end;
      ctx.fillStyle = isTotal ? AFTER_COLOR : MUTED;
      ctx.font = isTotal ? 'bold 13px Arial' : '11px Arial';
      ctx.textAlign = 'left';
      ctx.fillText('-' + fmt(saved) + '/mo', plot.x + plot.width + 14, y);

      ctx.globalAlpha = 1;
    }
  }

  // footer
  ctx.fillStyle = MUTED;
  ctx.font = '11px Arial';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'bottom';
  ctx.fillText('harshit.cloud  ·  three months, no perf regression', 60, HEIGHT - 18);
}

// ============================================================
// DRIVE THE ENCODER
// ============================================================
window.__GIF_READY__ = false;
window.__GIF_DATAURL__ = null;
window.__GIF_SIZE__ = 0;

(function generate() {
  var canvas = document.getElementById('canvas');
  var ctx = canvas.getContext('2d');
  var encoder = new GIFEncoder(WIDTH, HEIGHT);
  encoder.start();

  for (var i = 0; i <= ANIMATION.totalFrames; i++) {
    renderFrame(ctx, i / ANIMATION.totalFrames);
    encoder.addFrame(ctx, ANIMATION.frameDelay);
  }
  for (var j = 0; j < ANIMATION.holdFrames; j++) {
    renderFrame(ctx, 1);
    encoder.addFrame(ctx, ANIMATION.holdDelay);
  }
  var blob = encoder.finish();
  window.__GIF_SIZE__ = blob.size;

  var reader = new FileReader();
  reader.onload = function() {
    window.__GIF_DATAURL__ = reader.result;
    window.__GIF_READY__ = true;

    var url = URL.createObjectURL(blob);
    var a = document.getElementById('downloadGif');
    a.href = url;
    a.style.display = 'inline-block';
    a.textContent = 'download (' + (blob.size / 1024).toFixed(0) + ' KB)';
  };
  reader.readAsDataURL(blob);
})();
</script>
</body>
</html>
